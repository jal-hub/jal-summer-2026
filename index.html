// === iCal (.ics) generation pour trajets ========================================
// Génère un événement RFC 5545 avec rappels VALARM. iOS Calendar gère ensuite
// les notifs natives (1 jour avant + 2h avant).
function icsPad(n) { return String(n).padStart(2, "0"); }
function icsEscape(s) {
  return String(s == null ? "" : s)
    .replace(/\\/g, "\\\\")
    .replace(/;/g, "\\;")
    .replace(/,/g, "\\,")
    .replace(/\n/g, "\\n");
}
function icsLocalDateTime(isoDate, hhmm) {
  // "2026-06-28" + "08:00" → "20260628T080000" (floating local time)
  return isoDate.replace(/-/g, "") + "T" + hhmm.replace(":", "") + "00";
}
function icsAllDayDate(isoDate) {
  return isoDate.replace(/-/g, "");
}
function icsAddMinutesToHHMM(hhmm, minutes) {
  const [h, m] = hhmm.split(":").map(Number);
  let total = h * 60 + m + minutes;
  total = ((total % 1440) + 1440) % 1440;
  return icsPad(Math.floor(total / 60)) + ":" + icsPad(total % 60);
}
function icsFoldLines(lines) {
  // RFC 5545 : lignes max 75 chars (octets en théorie, on s'en tient à chars).
  // Lignes plus longues = fold avec CRLF + espace au début.
  const out = [];
  for (const line of lines) {
    if (line.length <= 75) { out.push(line); continue; }
    out.push(line.slice(0, 75));
    let rest = line.slice(75);
    while (rest.length > 74) { out.push(" " + rest.slice(0, 74)); rest = rest.slice(74); }
    if (rest.length) out.push(" " + rest);
  }
  return out;
}
function buildTrajetIcs(item, userId) {
  const o = item.obj;
  const now = new Date();
  const dtstamp = `${now.getUTCFullYear()}${icsPad(now.getUTCMonth()+1)}${icsPad(now.getUTCDate())}T${icsPad(now.getUTCHours())}${icsPad(now.getUTCMinutes())}${icsPad(now.getUTCSeconds())}Z`;
  const uidBase = `${item.date}-${userId}-${(o.vol || o.titre || "trajet").replace(/[^A-Za-z0-9]/g, "")}`;
  const uid = `${uidBase}@lecointre-summer-2026`;
  const emoji = ({vol:"✈️", train:"🚆", voiture:"🚗"})[o.type] || "↔️";
  const title = `${emoji} ${o.titre}`;

  const descParts = [];
  if (o.vol) descParts.push(`Vol : ${o.vol}`);
  if (o.compagnie) descParts.push(`Compagnie : ${o.compagnie}`);
  if (o.origine) descParts.push(`Départ : ${o.origine}` + (o.heureDepart ? ` à ${o.heureDepart}` : ""));
  if (o.destination) descParts.push(`Arrivée : ${o.destination}` + (o.heureArrivee ? ` à ${o.heureArrivee}` : ""));
  if (o.reference) descParts.push(`Référence : ${o.reference}`);
  if (o.notes) {
    const cleanInfo = parseTrajetNote(o.notes);
    const clean = (cleanInfo.cleanNote || "").trim();
    if (clean) descParts.push("\n" + clean);
  }

  const lines = [
    "BEGIN:VCALENDAR",
    "VERSION:2.0",
    "PRODID:-//Famille Lecointre//Summer 2026//FR",
    "CALSCALE:GREGORIAN",
    "METHOD:PUBLISH",
    "BEGIN:VEVENT",
    `UID:${uid}`,
    `DTSTAMP:${dtstamp}`,
  ];

  if (o.heureDepart) {
    lines.push(`DTSTART:${icsLocalDateTime(item.date, o.heureDepart)}`);
    const endHHMM = o.heureArrivee || icsAddMinutesToHHMM(o.heureDepart, 120);
    lines.push(`DTEND:${icsLocalDateTime(item.date, endHHMM)}`);
  } else {
    // Toute la journée (rare cas où on n'a pas d'heure)
    lines.push(`DTSTART;VALUE=DATE:${icsAllDayDate(item.date)}`);
    lines.push(`DTEND;VALUE=DATE:${icsAllDayDate(shiftDate(item.date, 1))}`);
  }

  lines.push(`SUMMARY:${icsEscape(title)}`);
  if (o.origine) lines.push(`LOCATION:${icsEscape(o.origine)}`);
  if (descParts.length) lines.push(`DESCRIPTION:${icsEscape(descParts.join("\n"))}`);

  // Rappels : 1 jour avant à 18h (visible dans la routine du soir) + 2h avant
  lines.push("BEGIN:VALARM", "TRIGGER:-P1D", "ACTION:DISPLAY", "DESCRIPTION:Trajet demain", "END:VALARM");
  lines.push("BEGIN:VALARM", "TRIGGER:-PT2H", "ACTION:DISPLAY", "DESCRIPTION:Trajet dans 2 heures", "END:VALARM");
  lines.push("END:VEVENT", "END:VCALENDAR");

  return icsFoldLines(lines).join("\r\n") + "\r\n";
}

// FlightRadar24 attend un numéro de vol sans leading zeros entre l'airline code
// et le n° de vol. Split airline (IATA 2 chars : 2 lettres OU 1 lettre + 1 digit)
// puis strip leading zeros.
// Exemples :
//   EK089 → ek89 (Emirates)
//   EK090 → ek90
//   AF0040 → af40 (Air France)
//   FR1234 → fr1234 (Ryanair, pas de leading zero)
//   EI234 → ei234 (Aer Lingus)
//   V70123 → v7123 (Volotea, code airline avec digit)
//   B6089 → b689 (JetBlue, idem)
function normalizeFr24Number(vol) {
  if (!vol) return "";
  const compact = String(vol).replace(/\s+/g, "").toUpperCase();
  // Tente d'abord les patterns IATA standards : 2 lettres OU 1 lettre + 1 chiffre
  let m = compact.match(/^([A-Z]{2}|[A-Z]\d)0*(\d+)$/);
  if (m) return (m[1] + m[2]).toLowerCase();
  // Fallback : tout préfixe non-numérique puis leading zeros puis chiffres
  m = compact.match(/^(\D+)0*(\d+)$/);
  if (m) return (m[1] + m[2]).toLowerCase();
  return compact.toLowerCase();
}

function addTrajetToCalendar(item, userId) {
  const ics = buildTrajetIcs(item, userId);
  const fnameBase = (item.obj.vol || item.obj.titre || "trajet").replace(/[^A-Za-z0-9]+/g, "_");
  const filename = `${item.date}_${fnameBase}.ics`;
  const blob = new Blob([ics], { type: "text/calendar;charset=utf-8" });
  const url = URL.createObjectURL(blob);

  // iOS Safari : navigation directe vers blob text/calendar → Safari détecte
  // le mime type et propose nativement "Ajouter à Calendar" en bannière haute.
  // BEAUCOUP plus propre que Web Share qui ne propose pas Calendar.
  // Desktop : navigation déclenche le téléchargement → ouverture par Calendar.
  const a = document.createElement("a");
  a.href = url;
  a.target = "_blank";
  a.rel = "noopener";
  // download attribute déclencherait un download au lieu d'une ouverture sur desktop ;
  // sur iOS Safari c'est ignoré et le mime text/calendar prend la main de toute façon.
  a.download = filename;
  a.style.display = "none";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  setTimeout(() => URL.revokeObjectURL(url), 10000);
}

    // Trajet : 1 seule ligne compacte (compagnie · vol · réf · coût) + note nettoyée
    const infoParts = [];
    if (o.compagnie) infoParts.push(o.compagnie);
    if (o.vol) infoParts.push(o.vol);
    if (o.reference) infoParts.push("Réf. " + o.reference);
    if (o.cost) infoParts.push(o.cost);
    if (infoParts.length) {
      container.appendChild(el("div", { class: "trajet-info" }, infoParts.join(" · ")));
    }
    // Actions trajet : Ajouter au calendrier + Suivre le vol (si vol et num connu)
    const actionsRow = el("div", { class: "trajet-actions" });
    const calBtn = el("button", {
      class: "btn-action btn-calendar",
      type: "button",
    }, iconSpan("calendar"), el("span", null, "Ajouter au calendrier"));
    calBtn.addEventListener("click", (e) => {
      e.preventDefault(); e.stopPropagation();
      addTrajetToCalendar(item, userId);
    });
    actionsRow.appendChild(calBtn);

    // FlightRadar24 : uniquement si type vol ET numéro de vol connu.
    // FR24 = meilleur UX grand public (radar live, position sur carte, mobile-first).
    // /!\ FR24 attend le numéro SANS leading zeros : EK089 → ek89, EK090 → ek90.
    if (o.type === "vol" && o.vol) {
      const fnum = normalizeFr24Number(o.vol);
      const fr24Url = `https://www.flightradar24.com/data/flights/${encodeURIComponent(fnum)}`;
      const trackBtn = el("a", {
        class: "btn-action btn-track",
        href: fr24Url, target: "_blank", rel: "noopener",
      }, iconSpan("radar"), el("span", null, "Suivre le vol"));
      trackBtn.addEventListener("click", (e) => { e.stopPropagation(); });
      actionsRow.appendChild(trackBtn);
    }
    container.appendChild(actionsRow);

    if (o.notes && o.notes.trim()) container.appendChild(blockFieldLinkified("Notes", o.notes));
  }

  if (o.docs && o.docs.length) {
    const d = el("div");
    d.appendChild(el("div", { class: "field-label" }, "Documents"));
    const wrap = el("div");
    for (const doc of o.docs) {
      const rawUrl = doc.url || `docs/${doc.file}`;
      const label = doc.label || doc.file;
      // Helper resolveDocUrl gère : jsdelivr CDN + cache-busting via ?v=hash
      const url = resolveDocUrl(rawUrl);
      const pill = el("a", {
        class: "doc-pill",
        href: url, target: "_blank", rel: "noopener noreferrer",
      }, iconSpan("doc"), el("span", null, label));
      // PDFs servis cross-origin (GitHub Pages) → iOS PWA escape vers Safari natif,
      // desktop ouvre en nouvel onglet. Rien d'autre à faire.
      const pdfShareBtn = el("button", { class: "doc-share", type: "button", title: "Partager ce PDF" }, iconSpan("share"));
      pdfShareBtn.addEventListener("click", (e) => {
        e.preventDefault(); e.stopPropagation();
        sharePdf(url, label);
      });
      const pillWrap = el("span", { class: "doc-pill-wrap" }, pill, pdfShareBtn);
      wrap.appendChild(pillWrap);
    }
    d.appendChild(wrap);
    container.appendChild(d);
  }
  // Note: le bouton "Partager" carte est dans le titleRow (en haut à droite) — voir renderCard
}

// === Share helpers ================================================================
function buildShareTextForItem(item, userId) {
  const o = item.obj;
  const isSejour = item.kind === "sejour";
  const lines = [];
  const emoji = isSejour ? "🏠" : ({vol:"✈️", train:"🚆", voiture:"🚗"}[o.type] || "↔️");
  lines.push(`${emoji} ${o.titre}`);
  if (isSejour) {
    lines.push(`${fmtDateRange(o.dateStart, o.dateEnd)} · ${nightsFromRange(o.dateStart, o.dateEnd)} nuits`);
    if (o.adresse) lines.push("📍 " + o.adresse);
    if (o.gmapsUrl) lines.push(o.gmapsUrl);
    if (o.contact) lines.push("📞 " + o.contact);
  } else {
    let meta = fmtDateSingle(o.date);
    if (o.heureDepart) meta += ` · ${o.heureDepart} → ${o.heureArrivee || ''}`;
    lines.push(meta);
    const infoParts = [];
    if (o.compagnie) infoParts.push(o.compagnie);
    if (o.vol) infoParts.push(o.vol);
    if (o.reference) infoParts.push("Réf. " + o.reference);
    if (o.cost) infoParts.push(o.cost);
    if (infoParts.length) lines.push(infoParts.join(" · "));
  }
  if (o.notes && o.notes.trim()) { lines.push(""); lines.push(o.notes.trim()); }
  if (o.docs && o.docs.length) {
    lines.push("");
    for (const d of o.docs) {
      const docUrl = resolveDocUrl(d.url || `docs/${d.file}`);
      lines.push("📄 " + (d.label || d.file) + " : " + docUrl);
    }
  }
  lines.push("");
  const appUrl = new URL(location.href);
  [...appUrl.searchParams.keys()].forEach(k => appUrl.searchParams.delete(k));
  appUrl.searchParams.set("user", userId);
  appUrl.searchParams.set("day", isSejour ? o.dateStart : o.date);
  lines.push("📱 " + appUrl.toString());
  return lines.join("\n");
}

async function shareItem(item, userId) {
  const text = buildShareTextForItem(item, userId);
  if (navigator.share) {
    try { await navigator.share({ text, title: item.obj.titre }); return; }
    catch (e) { if (e.name === "AbortError") return; }
  }
  try { await navigator.clipboard.writeText(text); showToast("Copié dans le presse-papier"); }
  catch (e) { showToast("Partage indisponible", true); }
}

async function sharePdf(url, label) {
  // Tente d'abord de partager le PDF comme FICHIER (envoie le doc dans WhatsApp,
  // pas juste l'URL). Nécessite navigator.canShare({files:...}) — iOS 16+.
  if (navigator.share && navigator.canShare) {
    try {
      showToast("Téléchargement du PDF…");
      const res = await fetch(url, { credentials: "omit" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const blob = await res.blob();
      const fileName = (label || "document").replace(/[^a-zA-Z0-9._-]+/g, "_") + ".pdf";
      const file = new File([blob], fileName, { type: "application/pdf" });
      if (navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: label });
        return;
      }
    } catch (e) {
      if (e.name === "AbortError") return;
      console.warn("Share file failed, fallback to URL:", e);
    }
  }
  // Fallback : partage l'URL
  if (navigator.share) {
    try { await navigator.share({ url, title: label }); return; }
    catch (e) { if (e.name === "AbortError") return; }
  }
  // Desktop : copie le lien
  try { await navigator.clipboard.writeText(url); showToast("Lien copié"); }
  catch (e) { showToast("Partage indisponible", true); }
}

// blockField (non linkified) supprimé : remplacé par blockFieldLinkified partout.
// Variante linkifiée : transforme http(s)://… et www.… en liens cliquables
function linkifyHtml(text) {
  if (!text) return "";
  const esc = String(text).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"})[c]);
  return esc.replace(
    /(https?:\/\/[^\s<>"]+|\bwww\.[^\s<>"]+)/g,
    (m) => {
      const href = m.startsWith("http") ? m : "https://" + m;
      return '<a href="' + href + '" target="_blank" rel="noopener noreferrer" style="color:var(--accent);text-decoration:underline;">' + m + '</a>';
    }
  );
}
function blockFieldLinkified(label, value) {
  const b = el("div");
  b.appendChild(el("div", { class: "field-label" }, label));
  b.appendChild(el("div", { class: "field-value", html: linkifyHtml(value) }));
  return b;
}

function renderMonth(year, month, dataStart, dataEnd) {
  const monthEl = el("div", { class: "cal-month" });
  monthEl.appendChild(el("div", { class: "cal-month-title" }, `${MONTHS_LONG[month]} ${year}`));

  const dowRow = el("div", { class: "cal-dow" });
  for (const d of DOW_FR) dowRow.appendChild(el("div", null, d));
  monthEl.appendChild(dowRow);

  const days = el("div", { class: "cal-days" });
  const firstOfMonth = new Date(year, month, 1);
  const firstDow = (firstOfMonth.getDay() + 6) % 7; // Lundi = 0
  for (let i = 0; i < firstDow; i++) days.appendChild(el("div", null));

  const daysInMonth = new Date(year, month + 1, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const dateObj = new Date(year, month, d);
    const inRange = dateObj >= dataStart && dateObj <= dataEnd;
    const isToday = dateObj.getTime() === TODAY.getTime();
    const iso = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cls = "cal-day" + (inRange ? "" : " is-out") + (isToday ? " is-today" : "");
    const cell = el("button", {
      class: cls, type: "button",
    }, String(d));
    if (inRange) cell.addEventListener("click", () => openDaySheet(iso));
    days.appendChild(cell);
  }
  monthEl.appendChild(days);
  return monthEl;
}

// === SAVE INFRASTRUCTURE (FSA + IDB) — port de l'OLD index.html ====================
const IDB_NAME = "jalSummerDB", IDB_STORE = "handles", IDB_KEY_HTML = "dashboardHtml";
let HTML_HANDLE = null;
let DIRTY = false;

function idbOpen() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(IDB_NAME, 1);
    r.onupgradeneeded = () => r.result.createObjectStore(IDB_STORE);
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function idbGet(key) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction(IDB_STORE, "readonly");
    const req = tx.objectStore(IDB_STORE).get(key);
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}
async function idbPut(key, v) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction(IDB_STORE, "readwrite");
    tx.objectStore(IDB_STORE).put(v, key);
    tx.oncomplete = () => res();
    tx.onerror = () => rej(tx.error);
  });
}
// idbDel supprimé : non utilisé. Si besoin futur, le ré-ajouter avec un commentaire.
async function ensurePermission(handle) {
  if (!handle) return false;
  try {
    if ((await handle.queryPermission({ mode: "readwrite" })) === "granted") return true;
    return (await handle.requestPermission({ mode: "readwrite" })) === "granted";
  } catch (e) { return false; }
}
async function writeBlobToHandle(handle, blob) {
  const writable = await handle.createWritable();
  await writable.write(blob);
  await writable.close();
}

async function saveDashboardHtml() {
  try {
    let handle = HTML_HANDLE;
    if (!handle && "showSaveFilePicker" in window) {
      try {
        handle = await window.showSaveFilePicker({
          suggestedName: "index.html",
          types: [{ description: "HTML", accept: { "text/html": [".html", ".htm"] } }],
        });
        HTML_HANDLE = handle;
        idbPut(IDB_KEY_HTML, handle).catch(e => console.warn("[save] idbPut failed", e));
      } catch (e) {
        if (e.name === "AbortError") { showToast("Sauvegarde annulée"); return false; }
        throw e;
      }
    }
    const dataJson = JSON.stringify(DATA);
    let currentHtml;
    if (handle) {
      if (!(await ensurePermission(handle))) throw new Error("Permission refusée");
      const file = await handle.getFile();
      currentHtml = await file.text();
    } else {
      currentHtml = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
    }
    if (!currentHtml || currentHtml.length < 1000) {
      throw new Error(`Doc trop petit (${currentHtml.length} octets)`);
    }
    // IMPORTANT : passer une FONCTION (pas une string) au replace pour éviter que les
     // patterns "$&", "$1", "$$" présents dans dataJson (notes utilisateur) soient
     // interprétés comme backrefs. Sinon corruption silencieuse de l'HTML sauvegardé.
    const replacement = () => `let DATA = ${dataJson};`;
    let newHtml = currentHtml.replace(
      /let DATA\s*=\s*\{[\s\S]*?\};(?=\s*\n\s*const TODAY)/m,
      replacement
    );
    if (newHtml === currentHtml) {
      newHtml = currentHtml.replace(/let DATA\s*=\s*\{[\s\S]*?\};/m, replacement);
      if (newHtml === currentHtml) throw new Error("Pattern 'let DATA = {...};' introuvable");
    }
    if (newHtml.length < 1000) throw new Error(`HTML résultant trop petit (${newHtml.length})`);
    const blob = new Blob([newHtml], { type: "text/html" });
    if (handle) {
      await writeBlobToHandle(handle, blob);
      markSaved();
      showToast(`Sauvé · ${(newHtml.length/1024).toFixed(1)} KB`);
      return true;
    }
    // Fallback download
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "index.html";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    markSaved();
    showToast(`Téléchargé · à déplacer vers index.html`);
    return true;
  } catch (e) {
    console.error(e);
    showToast(`Échec : ${e.message}`, true);
    return false;
  }
}

function showToast(msg, isError) {
  let t = document.querySelector(".toast");
  if (!t) { t = el("div", { class: "toast" }); document.body.appendChild(t); }
  t.textContent = msg;
  t.className = "toast show" + (isError ? " error" : "");
  clearTimeout(t._tid);
  t._tid = setTimeout(() => { t.className = "toast" + (isError ? " error" : ""); }, 3500);
}

  DIRTY = true;

    const fNote = el("div", { class: "modal-field" });
    fNote.appendChild(el("label", null, "Note (détails billets, contacts, etc.)"));
    inputNote = el("textarea", { placeholder: "Détails du vol/train, références booking, horaires…", rows: 5 });
    inputNote.value = currentNote;
    fNote.appendChild(inputNote);
    modal.appendChild(fNote);
  }

  // Documents trajet (PDFs liés au booking) — seulement si la cellule est un trajet
  let trajetDocs = null;
  if (isTrajet(currentAct)) {
    const currentDocs = ((DATA.docs_trajets || {})[noteKey] || []).map(d => ({...d}));
    trajetDocs = currentDocs;
    modal.appendChild(buildDocsField(trajetDocs, "Documents (PDFs pour ce trajet)", "docs/billet-ek077.pdf"));
  }

  // Enrichissement séjour — pour les cellules de séjour (ni routine, ni trajet, ni vide)
  let sejourEnrich = null;
  // Inclut les routines (ex. Boulot Dubai) car elles peuvent devenir des "bridges"
  // qui affichent l'enrichissement (Maps, etc.) sur le programme.
  const isSejourCell = currentAct && currentAct.trim() && !isTrajet(currentAct);
  if (isSejourCell) {
    modal.classList.add("is-large");
    const titre = cleanTitre(currentAct);
    const cur = ((DATA.enrichissements || {})[titre]) || {};
    const docsArr = Array.isArray(cur.docs) ? cur.docs.map(d => ({...d})) : [];

    const sep = el("div", { style: { marginTop: "18px", paddingTop: "16px", borderTop: "0.5px solid var(--separator)" } });
    sep.appendChild(el("div", { style: { fontSize: "12px", color: "var(--text-sec)", letterSpacing: "0.3px", marginBottom: "14px", fontWeight: "500" } },
      `Infos du séjour "${titre}" (s'appliquent à toute sa durée)`));
    modal.appendChild(sep);

    // 1. Notes générales en premier (champ le plus utilisé)
    const fGenNote = el("div", { class: "modal-field" });
    fGenNote.appendChild(el("label", null, "Notes (hôtel, wifi, infos pratiques)"));
    const inGenNote = el("textarea", { placeholder: "Ex: Bristol Hotel Geneva, check-in 15h, wifi BristolGuest", rows: 4 });
    inGenNote.value = cur.notes || "";
    fGenNote.appendChild(inGenNote);
    modal.appendChild(fGenNote);

    // 2. Adresse texte
    const fAdr = el("div", { class: "modal-field" });
    fAdr.appendChild(el("label", null, "Adresse"));
    const inAdr = el("input", { type: "text", placeholder: "Ex: 12 rue des Pins, Lacanau-Océan", value: cur.adresse || "" });
    fAdr.appendChild(inAdr);
    modal.appendChild(fAdr);

    // 3. Lien Maps (URL uniquement, attention)
    const fMap = el("div", { class: "modal-field" });
    fMap.appendChild(el("label", null, "URL Google Maps (commence par https://) — optionnel"));
    const inMap = el("input", { type: "url", placeholder: "https://maps.google.com/?q=...", value: cur.gmapsUrl || "" });
    fMap.appendChild(inMap);
    modal.appendChild(fMap);

    // 4. Contact
    const fCont = el("div", { class: "modal-field" });
    fCont.appendChild(el("label", null, "Contact"));
    const inCont = el("input", { type: "text", placeholder: "Ex: Esteban — 06 12 34 56 78", value: cur.contact || "" });
    fCont.appendChild(inCont);
    modal.appendChild(fCont);

    // 5. Documents
    modal.appendChild(buildDocsField(docsArr, "Documents PDF (séjour)", "docs/hotel-confirmation.pdf"));

    sejourEnrich = { titre, inAdr, inMap, inCont, inGenNote, docsArr, prev: cur };
  }

  const close = () => { backdrop.classList.remove("show"); setTimeout(() => backdrop.remove(), 220); };
  const save = () => {
    const newAct = inputAct.value.trim();
    let changed = false;
    if (newAct !== currentAct) {
      DATA.d[rowIdx][colIdx] = newAct;
      changed = true;
    }
    if (inputNote !== null) {
      const newNote = inputNote.value;
      if (newNote !== currentNote) {
        if (!DATA.c) DATA.c = {};
        if (newNote.trim() === "") delete DATA.c[noteKey];
        else DATA.c[noteKey] = newNote;
        changed = true;
      }
    }
    if (trajetDocs !== null) {
      const cleanDocs = trajetDocs
        .filter(d => d.url && d.url.trim())
        .map(d => ({ label: d.label.trim() || d.url.trim().split('/').pop(), url: d.url.trim() }));
      const prevDocs = (DATA.docs_trajets || {})[noteKey] || [];
      if (JSON.stringify(cleanDocs) !== JSON.stringify(prevDocs)) {
        if (!DATA.docs_trajets) DATA.docs_trajets = {};
        if (cleanDocs.length === 0) delete DATA.docs_trajets[noteKey];
        else DATA.docs_trajets[noteKey] = cleanDocs;
        changed = true;
      }
    }
    if (sejourEnrich) {
      const { titre, inAdr, inMap, inCont, inGenNote, docsArr, prev } = sejourEnrich;
      const cleanDocs = docsArr.filter(d => d.url && d.url.trim())
        .map(d => ({ label: d.label.trim() || d.url.trim().split('/').pop(), url: d.url.trim() }));
      const newE = {
        adresse: inAdr.value.trim(),
        gmapsUrl: inMap.value.trim(),
        contact: inCont.value.trim(),
        notes: inGenNote.value.trim(),
        docs: cleanDocs,
      };
      const hasContent = newE.adresse || newE.gmapsUrl || newE.contact || newE.notes || cleanDocs.length > 0;
      const prevStr = JSON.stringify({ adresse: prev.adresse || "", gmapsUrl: prev.gmapsUrl || "", contact: prev.contact || "", notes: prev.notes || "", docs: prev.docs || [] });
      const newStr = JSON.stringify(newE);
      if (prevStr !== newStr) {
        if (!DATA.enrichissements) DATA.enrichissements = {};
        if (hasContent) DATA.enrichissements[titre] = newE;
        else delete DATA.enrichissements[titre];
        changed = true;
      }
    }
    if (changed) { markDirty(); renderEdit(); }
    close();
  };

  const actions = el("div", { class: "modal-actions" });
  actions.appendChild(el("button", { class: "modal-btn modal-btn-cancel", onClick: close }, "Annuler"));
  actions.appendChild(el("button", { class: "modal-btn modal-btn-save", onClick: save }, "Enregistrer"));
  modal.appendChild(actions);

  inputAct.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); save(); }
    else if (e.key === "Escape") close();
  });

  backdrop.addEventListener("click", (e) => { if (e.target === backdrop) close(); });
  backdrop.appendChild(modal);
  document.body.appendChild(backdrop);
  requestAnimationFrame(() => backdrop.classList.add("show"));
  setTimeout(() => { inputAct.focus(); inputAct.select(); }, 100);
}

// === Day editor : changer date / supprimer un jour =================================
function openDayEditor(rowIdx) {
  const row = DATA.d[rowIdx];
  const md = row[0];
  const isoDate = `2026-${md}`;
  const dateLabel = `${DOW_LONG_FR[row[1]] || row[1]} ${parseInt(md.slice(3))} ${MONTHS_LONG[parseInt(md.slice(0,2)) - 1]} 2026`;

  const backdrop = el("div", { class: "modal-backdrop" });
  const modal = el("div", { class: "modal" });
  modal.appendChild(el("div", { class: "modal-title" }, "Modifier le jour"));
  modal.appendChild(el("div", { class: "modal-sub" }, dateLabel));

  const fDate = el("div", { class: "modal-field" });
  fDate.appendChild(el("label", null, "Date"));
  const inputDate = el("input", { type: "date", value: isoDate });
  fDate.appendChild(inputDate);
  modal.appendChild(fDate);

  // Warning + delete button
  const dangerBlock = el("div", { style: { marginTop: "20px", padding: "12px 14px", background: "rgba(207,48,48,0.08)", borderRadius: "10px", border: "0.5px solid rgba(207,48,48,0.3)" } });
  dangerBlock.appendChild(el("div", { style: { fontSize: "13px", color: "var(--text-sec)", marginBottom: "10px" } }, "Supprimer ce jour effacera toutes ses activités et notes."));
  const delBtn = el("button", { class: "modal-btn", style: { background: "rgb(207,48,48)", color: "white", width: "100%" }, onClick: () => {
    if (!confirm(`Supprimer ${dateLabel} ? (irréversible avant save)`)) return;
    // Remove all c entries for this date
    const datePrefix = `${YEAR_DEFAULT}-${md}|`;
    Object.keys(DATA.c || {}).forEach(k => { if (k.startsWith(datePrefix)) delete DATA.c[k]; });
    // Remove the row
    DATA.d.splice(rowIdx, 1);
    // Update meta dateStart/dateEnd
    if (DATA.d.length > 0) {
      DATA.meta.dateStart = `${YEAR_DEFAULT}-${DATA.d[0][0]}`;
      DATA.meta.dateEnd = `${YEAR_DEFAULT}-${DATA.d[DATA.d.length-1][0]}`;
    }
    markDirty();
    close();
    renderEdit();
  } }, "Supprimer ce jour");
  dangerBlock.appendChild(delBtn);
  modal.appendChild(dangerBlock);

  const close = () => { backdrop.classList.remove("show"); setTimeout(() => backdrop.remove(), 220); };
  const save = () => {
    const newIso = inputDate.value;
    if (!newIso) { close(); return; }
    if (newIso === isoDate) { close(); return; }
    if (!newIso.startsWith("2026-")) { showToast("Année 2026 uniquement", true); return; }
    const newMd = newIso.slice(5);
    if (DATA.d.some((r, i) => i !== rowIdx && r[0] === newMd)) {
      showToast("Cette date existe déjà", true); return;
    }
    // Update row md + dow
    row[0] = newMd;
    row[1] = dowShort(newIso);
    // Move c entries
    const oldPrefix = `2026-${md}|`;
    const newPrefix = `2026-${newMd}|`;
    Object.keys(DATA.c || {}).forEach(k => {
      if (k.startsWith(oldPrefix)) {
        const newKey = k.replace(oldPrefix, newPrefix);
        DATA.c[newKey] = DATA.c[k]; delete DATA.c[k];
      }
    });
    // Re-sort DATA.d by md
    DATA.d.sort((a, b) => a[0].localeCompare(b[0]));
    // Update meta
    DATA.meta.dateStart = `${YEAR_DEFAULT}-${DATA.d[0][0]}`;
    DATA.meta.dateEnd = `${YEAR_DEFAULT}-${DATA.d[DATA.d.length-1][0]}`;
    markDirty();
    close();
    renderEdit();
  };

  const actions = el("div", { class: "modal-actions" });
  actions.appendChild(el("button", { class: "modal-btn modal-btn-cancel", onClick: close }, "Annuler"));
  actions.appendChild(el("button", { class: "modal-btn modal-btn-save", onClick: save }, "Enregistrer"));
  modal.appendChild(actions);

  backdrop.addEventListener("click", (e) => { if (e.target === backdrop) close(); });
  backdrop.appendChild(modal);
  document.body.appendChild(backdrop);
  requestAnimationFrame(() => backdrop.classList.add("show"));
}

function dowShort(iso) {
  const [y,m,d] = iso.split("-").map(Number);
  const day = new Date(y, m-1, d).getDay();
  return ["Su","Mo","Tu","We","Th","Fr","Sa"][day];
}

// === Enrichissements séjours =====================================================
function uniqueSejourTitles() {
  const map = new Map(); // titre → { dates:[{start,end,users:[]}] }
  for (const u of DATA.users) {
    for (const s of computeStretches(u.id)) {
      if (!map.has(s.clean)) map.set(s.clean, []);
      // Find or create date range entry
      const arr = map.get(s.clean);
      const found = arr.find(x => x.start === s.start && x.end === s.end);
      if (found) found.users.push(u.id);
      else arr.push({ start: s.start, end: s.end, tentatif: s.tentatif, users: [u.id] });
    }
  }
  // Sort by earliest date
  return [...map.entries()]
    .sort((a, b) => a[1][0].start.localeCompare(b[1][0].start))
    .map(([titre, ranges]) => ({ titre, ranges }));
}

function renderEnrichSection() {
  const wrap = el("div", { class: "enrich-section" });
  wrap.appendChild(el("h2", { class: "enrich-title" }, "Enrichissements des séjours"));
  wrap.appendChild(el("p", { class: "enrich-sub" }, "Ajoute adresse, contact, lien Google Maps et documents PDF pour chaque séjour. Ces infos apparaissent dans la carte mobile dépliée."));

  const list = el("div", { class: "enrich-list" });
  const titles = uniqueSejourTitles();
  for (const { titre, ranges } of titles) {
    const enrich = (DATA.enrichissements || {})[titre];
    const hasEnrich = enrich && (enrich.adresse || enrich.gmapsUrl || enrich.contact || enrich.notes || (enrich.docs && enrich.docs.length));
    const row = el("div", { class: "enrich-row" });
    row.appendChild(el("div", { class: "enrich-row-titre" }, titre));
    // Show first date range (most common)
    const r0 = ranges[0];
    const datesLabel = r0.start === r0.end
      ? fmtDateSingle(r0.start)
      : fmtDateRange(r0.start, r0.end);
    row.appendChild(el("div", { class: "enrich-row-dates" }, datesLabel));
    row.appendChild(el("span", { class: "enrich-badge " + (hasEnrich ? "done" : "todo") }, hasEnrich ? "Enrichi" : "À enrichir"));
    row.addEventListener("click", () => openEnrichEditor(titre));
    list.appendChild(row);
  }
  wrap.appendChild(list);
  return wrap;
}

  inCont.value = current.contact || "";
  fCont.appendChild(inCont);

  // Notes (override)
  const fNote = el("div", { class: "modal-field" });
  fNote.appendChild(el("label", null, "Notes (instructions, infos pratiques)"));
  const inNote = el("textarea", { placeholder: "Clé sous le pot rouge, code WiFi, etc.", rows: 4 });
  inNote.value = current.notes || "";
  fNote.appendChild(inNote);
  modal.appendChild(fNote);

  // Documents (label + url pairs)
  const fDocs = el("div", { class: "modal-field" });
  fDocs.appendChild(el("label", null, "Documents (PDFs hébergés)"));
  const docsList = el("div");
  let docs = Array.isArray(current.docs) ? [...current.docs] : [];
  function renderDocs() {
    docsList.innerHTML = "";
    docs.forEach((doc, i) => {
      const pill = el("div", { class: "doc-pill-edit" });
      const inLabel = el("input", { type: "text", placeholder: "Libellé", value: doc.label || "" });
      const inUrl = el("input", { type: "text", placeholder: "URL ou docs/fichier.pdf", value: doc.url || doc.file || "" });
      inLabel.addEventListener("input", () => { docs[i].label = inLabel.value; });
      inUrl.addEventListener("input", () => { docs[i].url = inUrl.value; });
      pill.appendChild(inLabel);
      pill.appendChild(inUrl);
      pill.appendChild(el("button", { class: "doc-remove", type: "button", title: "Supprimer", onClick: () => { docs.splice(i, 1); renderDocs(); } }, "×"));
      docsList.appendChild(pill);

  }
  renderDocs();
  fDocs.appendChild(docsList);

  modal.appendChild(fDocs);

  const close = () => { backdrop.classList.remove("show"); setTimeout(() => backdrop.remove(), 220); };
  const save = () => {
    const cleanDocs = docs.filter(d => d.url && d.url.trim());
    const adresse = inAdr.value.trim();
    const gmapsUrl = inMap.value.trim();
    const contact = inCont.value.trim();
    const notes = inNote.value.trim();
    if (!adresse && !gmapsUrl && !contact && !notes && cleanDocs.length === 0) {
      // All empty → delete the enrichment entry
      delete DATA.enrichissements[titre];
    } else {
      DATA.enrichissements[titre] = {
        adresse, gmapsUrl, contact, notes,
        docs: cleanDocs.map(d => ({ label: d.label.trim() || d.url.split('/').pop(), url: d.url.trim() })),
      };
    }
    markDirty();
    close();
    renderEdit();
  };

  const actions = el("div", { class: "modal-actions" });
  actions.appendChild(el("button", { class: "modal-btn modal-btn-cancel", onClick: close }, "Annuler"));
  actions.appendChild(el("button", { class: "modal-btn modal-btn-save", onClick: save }, "Enregistrer"));
  modal.appendChild(actions);

  backdrop.addEventListener("click", (e) => { if (e.target === backdrop) close(); });
  backdrop.appendChild(modal);
  document.body.appendChild(backdrop);
  requestAnimationFrame(() => backdrop.classList.add("show"));
  setTimeout(() => inAdr.focus(), 100);
}

// === XLSX Export (port de l'OLD index.html) ======================================
const IDB_KEY_XLSX = "summerXlsx";
let SAVE_HANDLE = null;

(async () => {
  try { const h = await idbGet(IDB_KEY_XLSX); if (h) SAVE_HANDLE = h; } catch (e) {}
})();

function buildXlsxBlob() {
  if (typeof XLSX === "undefined") throw new Error("SheetJS pas chargé (vérifier connexion)");
  const aoa = [[], ["Day","Dates","Anatole","Auguste","Sixtine","Carole","JAL","Dates 2","Day 2"]];
  const DAY_LONG = { Sa:"Saturday", Su:"Sunday", Mo:"Monday", Tu:"Tuesday", We:"Wednesday", Th:"Thursday", Fr:"Friday" };
  for (const r of DATA.d) {
    const md = r[0]; const dt = new Date("2026-" + md + "T00:00");
    const dayName = DAY_LONG[r[1]] || r[1];
    aoa.push([dayName, dt, r[2], r[3], r[4], r[5], r[6], dt, dayName]);
  }
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  // Inject comments from DATA.c
  const COL_LETTER = { anatole:"C", auguste:"D", sixtine:"E", carole:"F", jal:"G" };
  for (const key of Object.keys(DATA.c || {})) {
    const [date, p] = key.split("|");
    if (!COL_LETTER[p]) continue;  // user inconnu (renommé) → skip plutôt que cellule fantôme "undefined3"
    const md = date.slice(5);
    const idx = DATA.d.findIndex(r => r[0] === md);
    if (idx < 0) continue;
    const rowNum = idx + 3;
    const cellAddr = COL_LETTER[p] + rowNum;
    if (!ws[cellAddr]) ws[cellAddr] = { t: "s", v: "" };
    ws[cellAddr].c = [{ a: "JAL Dashboard", t: DATA.c[key] }];
  }
  const lastRow = DATA.d.length + 2;
  for (let r = 3; r <= lastRow; r++) for (const col of ["B","H"]) { const ad = col + r; if (ws[ad]) ws[ad].t = "d"; }
  ws["!cols"] = [{wch:11},{wch:12},{wch:32},{wch:32},{wch:28},{wch:24},{wch:18},{wch:12},{wch:11}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Summer 2026");
  const ab = XLSX.write(wb, { bookType: "xlsx", type: "array" });
  return new Blob([ab], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
}

async function exportXlsx() {
  try {
    const blob = buildXlsxBlob();
    let handle = SAVE_HANDLE;
    if (!handle && "showSaveFilePicker" in window) {
      try {
        handle = await window.showSaveFilePicker({
          suggestedName: "Summer 2026.xlsx",
          types: [{ description: "Excel", accept: { "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet": [".xlsx"] } }],
        });
        SAVE_HANDLE = handle;
        idbPut(IDB_KEY_XLSX, handle).catch(e => console.warn("[xlsx] idbPut failed", e));
      } catch (e) {
        if (e.name === "AbortError") { showToast("Export annulé"); return; }
        throw e;
      }
    }
    if (handle) {
      if (!(await ensurePermission(handle))) throw new Error("Permission refusée");
      await writeBlobToHandle(handle, blob);
      showToast(`XLSX exporté · ${(blob.size/1024).toFixed(1)} KB`);
    } else {
      // Fallback download
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = "Summer 2026.xlsx";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      showToast(`XLSX téléchargé · ${(blob.size/1024).toFixed(1)} KB`);
    }
  } catch (e) {
    console.error(e);
    showToast(`Échec XLSX : ${e.message}`, true);
  }
}

  actions.appendChild(el("button", { class: "modal-btn modal-btn-save", onClick: save }, "Ajouter"));

  document.body.appendChild(backdrop);
  requestAnimationFrame(() => backdrop.classList.add("show"));
}
