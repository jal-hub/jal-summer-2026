<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Été 2026">
<meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=110da31b">
<link rel="icon" href="apple-touch-icon.png?v=110da31b">
<title>Summer 2026 — Famille Lecointre</title>
<style>
:root {
  --bg: #f2f2f7;
  --card: #ffffff;
  --card-border: rgba(60, 60, 67, 0.12);
  --text: #000000;
  --text-sec: #8e8e93;
  --text-ter: #c7c7cc;
  --accent: #007aff;
  --accent-bg: rgba(0, 122, 255, 0.10);
  --accent-text: #0050b3;
  --separator: rgba(60, 60, 67, 0.18);
  --tentatif: #ff9500;
  --tentatif-bg: rgba(255, 149, 0, 0.10);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #000000;
    --card: #1c1c1e;
    --card-border: rgba(255, 255, 255, 0.08);
    --text: #ffffff;
    --text-sec: #8e8e93;
    --text-ter: #48484a;
    --accent: #0a84ff;
    --accent-bg: rgba(10, 132, 255, 0.18);
    --accent-text: #5ac8fa;
    --separator: rgba(84, 84, 88, 0.6);
    --tentatif: #ff9f0a;
    --tentatif-bg: rgba(255, 159, 10, 0.16);
  }
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.4;
  font-size: 16px;
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
}
.app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
}
.screen { padding: 16px 20px 40px; }

/* HOME */
.home-subtitle { font-size: 15px; font-weight: 500; color: var(--text-sec); margin-top: 12px; }
.home-title { font-size: 28px; font-weight: 600; letter-spacing: -0.4px; margin-top: 2px; }
.home-prompt { font-size: 15px; color: var(--text-sec); margin-top: 6px; margin-bottom: 40px; }

.avatar-grid {
  display: flex; flex-direction: column;
  align-items: center;
  gap: 28px;
  margin-bottom: 40px;
}
.avatar-row { display: flex; justify-content: center; gap: 32px; }
.avatar-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: inherit;
  cursor: pointer;
}

.avatar {
  width: 76px; height: 76px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; font-weight: 600; letter-spacing: -0.5px;
  user-select: none;
}
.avatar-name { font-size: 15px; color: var(--text); font-weight: 400; }
.avatar.has-photo { overflow: hidden; }
.avatar.has-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }

.r-teal   { background: #5DCAA5; color: #04342C; }
.r-pink   { background: #ED93B1; color: #4B1528; }
.r-blue   { background: #85B7EB; color: #042C53; }
.r-green  { background: #97C459; color: #173404; }
.r-purple { background: #AFA9EC; color: #26215C; }
.r-amber  { background: #EF9F27; color: #412402; }
.r-coral  { background: #F0997B; color: #4A1B0C; }

/* PROGRAMME header */
.prog-header { padding: 12px 20px 8px; }
.back-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.back-btn {
  display: inline-flex; align-items: center; gap: 2px;
  color: var(--accent);
  font-size: 16px; padding: 6px 10px 6px 0;
  text-decoration: none; cursor: pointer;
}
.back-btn .icon { width: 24px; height: 24px; display: inline-block; }
.user-switch { display: flex; gap: 8px; align-items: center; }
.user-switch .avatar {
  width: 30px; height: 30px; font-size: 12px; font-weight: 600;
  opacity: 0.6; transition: opacity 0.2s, transform 0.2s;
}
.user-switch .avatar.is-current { width: 36px; height: 36px; font-size: 13px; opacity: 1; }
.prog-eyebrow { font-size: 13px; color: var(--text-sec); margin-top: 14px; }
.prog-title { font-size: 28px; font-weight: 600; letter-spacing: -0.4px; margin-top: 2px; margin-bottom: 4px; }

/* NEXT banner */
.next-card {
  margin: 14px 16px 14px;
  background: var(--accent-bg);
  border: 0.5px solid var(--accent);
  border-radius: 16px;
  padding: 12px 14px;
  color: var(--accent-text);
}
.next-eyebrow { font-size: 12px; font-weight: 500; opacity: 0.85; }
.next-title { display: flex; align-items: center; gap: 8px; font-size: 17px; font-weight: 600; margin-top: 3px; }
.next-meta { font-size: 13px; opacity: 0.85; margin-top: 2px; padding-left: 28px; }
.next-title .icon { width: 20px; height: 20px; flex-shrink: 0; }

/* Cards */
.cards { padding: 0 16px 32px; display: flex; flex-direction: column; gap: 8px; }
.card {
  background: var(--card);
  border: 0.5px solid var(--card-border);
  border-radius: 16px;
  padding: 12px 14px;
  cursor: pointer;
  transition: background 0.12s;
}
.card:active { background: var(--separator); }
.card.is-expanded { padding-bottom: 16px; }
.card.is-tentatif {
  background: var(--tentatif-bg);
  border-color: var(--tentatif);
}
.card.is-past { opacity: 0.5; }

.card-row { display: flex; align-items: center; gap: 10px; }
.card-icon {
  width: 18px; height: 18px;
  flex-shrink: 0;
  color: var(--text-sec);
}
.card.is-tentatif .card-icon { color: var(--tentatif); }
.card-title {
  font-size: 15px; font-weight: 600; color: var(--text);
  display: inline-flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.card-meta {
  font-size: 13px; color: var(--text-sec);
  padding-left: 28px; margin-top: 2px;
}
.card-chips { padding-left: 28px; margin-top: 8px; }
.chip {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 12px; padding: 3px 10px;
  background: var(--separator);
  border-radius: 999px;
  color: var(--text-sec);
}
.chip .icon { width: 12px; height: 12px; }

.tentatif-badge {
  display: inline-block;
  font-size: 11px; font-weight: 500;
  padding: 2px 8px;
  background: var(--tentatif);
  color: white;
  border-radius: 999px;
}

.card-expand {
  margin-top: 14px; padding-top: 12px;
  border-top: 0.5px solid var(--separator);
  display: flex; flex-direction: column; gap: 14px;
}
.field-label { font-size: 12px; color: var(--text-sec); margin-bottom: 4px; font-weight: 500; }
.field-value { font-size: 14px; color: var(--text); line-height: 1.5; white-space: pre-wrap; }

.btn-maps {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px;
  background: var(--accent); color: white;
  border-radius: 999px;
  font-size: 13px; font-weight: 500;
  text-decoration: none;
  margin-top: 6px;
  border: none; cursor: pointer;
  -webkit-appearance: none;
}
.btn-maps .icon { width: 14px; height: 14px; }

.doc-pill {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px;
  padding: 7px 12px;
  background: var(--separator);
  border-radius: 10px;
  color: var(--text);
  text-decoration: none;
  margin-right: 6px; margin-top: 4px;
}
.doc-pill .icon { width: 14px; height: 14px; color: var(--text-sec); }

.contact-row { display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--text); }
.contact-row .icon { width: 13px; height: 13px; color: var(--text-sec); }
.contact-row a { color: var(--accent); text-decoration: none; }

.icon { display: inline-block; vertical-align: middle; }
.icon svg { width: 100%; height: 100%; display: block; }

/* Context bands (avant/après les vacances) */
.context-band {
  margin: 8px 16px;
  padding: 10px 14px;
  background: var(--separator);
  border-radius: 12px;
  color: var(--text-sec);
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.context-band .icon { width: 14px; height: 14px; }
.context-band-label { font-weight: 500; color: var(--text); }

.empty-state { padding: 60px 24px; text-align: center; color: var(--text-sec); }
.edit-screen { padding: 40px 24px; text-align: center; color: var(--text-sec); }
.edit-screen h1 { font-size: 22px; color: var(--text); margin-bottom: 16px; }
.edit-screen a { color: var(--accent); text-decoration: none; }

/* Calendrier famille (home) */
.cal-eyebrow {
  padding: 0 20px;
  font-size: 13px;
  color: var(--text-sec);
  margin-bottom: 8px;
}
.cal-wrap { padding: 0 16px 32px; }
.cal-month {
  background: var(--card);
  border: 0.5px solid var(--card-border);
  border-radius: 16px;
  padding: 14px;
  margin-bottom: 12px;
}
.cal-month-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 10px;
  text-transform: capitalize;
  color: var(--text);
}
.cal-dow {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  font-size: 11px;
  color: var(--text-sec);
  text-align: center;
  margin-bottom: 6px;
  font-weight: 500;
}
.cal-days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}
.cal-day {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  border-radius: 8px;
  cursor: pointer;
  color: var(--text);
  background: transparent;
  border: none;
  font-family: inherit;
  padding: 0;
  -webkit-appearance: none;
  transition: background 0.12s;
}
.cal-day:active { background: var(--separator); }
.cal-day.is-out { color: var(--text-ter); cursor: default; pointer-events: none; }
.cal-day.is-today { background: var(--accent); color: white; font-weight: 600; }
.cal-day.has-event::after {
  content: "";
  position: absolute;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--accent);
  margin-top: 20px;
}
.cal-day { position: relative; }

/* Day sheet (bottom modal) */
.sheet-backdrop {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.4);
  z-index: 100;
  opacity: 0;
  transition: opacity 0.25s;
}
.sheet-backdrop.show { opacity: 1; }
.sheet {
  position: fixed; left: 0; right: 0; bottom: 0;
  background: var(--card);
  border-top-left-radius: 24px;
  border-top-right-radius: 24px;
  padding: 12px 20px calc(env(safe-area-inset-bottom, 0px) + 20px);
  transform: translateY(100%);
  transition: transform 0.25s ease-out;
  z-index: 101;
  max-height: 85vh;
  overflow-y: auto;
  max-width: 480px;
  margin: 0 auto;
}
.sheet.show { transform: translateY(0); }
.sheet-grip {
  width: 36px; height: 4px;
  background: var(--text-ter);
  border-radius: 2px;
  margin: 4px auto 14px;
}
.sheet-title {
  font-size: 18px; font-weight: 600;
  text-align: center;
  margin-bottom: 16px;
  text-transform: capitalize;
  color: var(--text);
}
.sheet-row {
  display: flex; align-items: center;
  gap: 14px;
  padding: 10px 0;
  border-top: 0.5px solid var(--separator);
}
.sheet-row:first-of-type { border-top: 0; }
.sheet-row .avatar { width: 32px; height: 32px; font-size: 12px; font-weight: 600; flex-shrink: 0; }
.sheet-row-name { font-weight: 500; color: var(--text); min-width: 62px; font-size: 14px; }
.sheet-row-act { color: var(--text-sec); font-size: 14px; flex: 1; }
.sheet-close {
  display: block; width: 100%;
  margin-top: 16px;
  padding: 13px;
  background: var(--separator);
  border: none; border-radius: 12px;
  font-size: 16px; font-weight: 500;
  color: var(--text); cursor: pointer;
  font-family: inherit;
  -webkit-appearance: none;
}

/* Edit mode : desktop-only */
body.edit-mode .app { max-width: 100%; }
.edit-header {
  position: sticky; top: 0; z-index: 50;
  background: var(--bg);
  padding: 12px 16px;
  border-bottom: 0.5px solid var(--separator);
  display: flex; align-items: center; gap: 12px;
}
.edit-title { font-size: 17px; font-weight: 600; flex: 1; color: var(--text); }
.edit-back {
  display: inline-flex; align-items: center; gap: 2px;
  color: var(--accent);
  font-size: 16px; padding: 6px 10px 6px 0;
  text-decoration: none; cursor: pointer;
  border: none; background: transparent;
  font-family: inherit;
}
.edit-back .icon { width: 22px; height: 22px; }
.save-btn {
  background: var(--accent); color: white;
  border: none; border-radius: 999px;
  padding: 9px 18px;
  font-size: 14px; font-weight: 500;
  cursor: pointer; font-family: inherit;
  -webkit-appearance: none;
  position: relative;
  transition: background 0.15s;
}
.save-btn.is-dirty { background: var(--tentatif); }
.save-btn.is-dirty::after {
  content: ""; position: absolute;
  top: 6px; right: 6px;
  width: 8px; height: 8px;
  background: white; border-radius: 50%;
}
.tool-btn {
  background: transparent;
  border: 0.5px solid var(--separator);
  color: var(--text);
  border-radius: 999px;
  padding: 7px 14px;
  font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: inherit;
  -webkit-appearance: none;
}
.tool-btn:hover { background: var(--separator); }
.edit-grid td.col-date.is-clickable { cursor: pointer; transition: background 0.12s; }
.edit-grid td.col-date.is-clickable:hover { background: var(--accent-bg); color: var(--accent); }

/* Section enrichissements */
.enrich-section { padding: 24px 16px 80px; }
.enrich-title { font-size: 17px; font-weight: 600; margin-bottom: 4px; color: var(--text); }
.enrich-sub { font-size: 13px; color: var(--text-sec); margin-bottom: 16px; }
.enrich-list { display: flex; flex-direction: column; gap: 6px; }
.enrich-row {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 14px;
  background: var(--card);
  border: 0.5px solid var(--card-border);
  border-radius: 12px;
  cursor: pointer;
  transition: background 0.12s;
}
.enrich-row:hover { background: var(--accent-bg); }
.enrich-row-titre { font-weight: 500; color: var(--text); font-size: 14px; flex: 1; }
.enrich-row-dates { font-size: 12px; color: var(--text-sec); }
.enrich-badge {
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 999px;
  font-weight: 500;
}
.enrich-badge.done { background: rgba(45, 158, 117, 0.16); color: rgb(15, 110, 86); }
.enrich-badge.todo { background: var(--separator); color: var(--text-sec); }
@media (prefers-color-scheme: dark) {
  .enrich-badge.done { background: rgba(45, 158, 117, 0.24); color: rgb(157, 226, 199); }
}

.modal.is-large { max-width: 540px; max-height: 85vh; overflow-y: auto; }
.doc-pill-edit {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 12px;
  background: var(--bg);
  border: 0.5px solid var(--separator);
  border-radius: 10px;
  margin-bottom: 6px;
}
.doc-pill-edit input {
  flex: 1; border: none; background: transparent; padding: 4px 0;
  font-size: 13px; color: var(--text); font-family: inherit;
  outline: none; min-width: 0;
}
.doc-pill-edit .doc-remove {
  background: transparent; border: none;
  color: var(--text-sec); cursor: pointer;
  font-size: 18px; padding: 0 4px; line-height: 1;
  font-family: inherit;
}
.doc-add-btn {
  background: transparent;
  border: 0.5px dashed var(--separator);
  color: var(--accent);
  border-radius: 10px; padding: 8px 12px;
  cursor: pointer; font-family: inherit;
  font-size: 13px;
  -webkit-appearance: none;
  margin-top: 4px;
  width: 100%;
}

.edit-grid-wrap { overflow-x: auto; padding-bottom: 60px; }
.edit-grid {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  background: var(--card);
}
.edit-grid th, .edit-grid td {
  border: 0.5px solid var(--separator);
  padding: 8px 10px;
  text-align: left;
  vertical-align: middle;
  white-space: nowrap;
}
.edit-grid th {
  background: var(--bg);
  font-size: 11px;
  font-weight: 600;
  color: var(--text-sec);
  position: sticky; top: 57px;
  z-index: 10;
}
.edit-grid .col-date { width: 80px; color: var(--text-sec); font-variant-numeric: tabular-nums; }
.edit-grid .col-dow { width: 36px; color: var(--text-sec); text-align: center; }
.edit-grid .cell {
  cursor: pointer;
  user-select: none;
  transition: background 0.12s;
  min-width: 120px;
}
.edit-grid .cell:hover { background: var(--accent-bg); }
.edit-grid .cell.is-routine { color: var(--text-ter); }
.edit-grid .cell.is-trajet { color: var(--accent); }
.edit-grid .cell.has-note { position: relative; padding-right: 22px; }
.edit-grid .cell.has-note::after {
  content: ""; position: absolute;
  right: 8px; top: 50%; transform: translateY(-50%);
  width: 6px; height: 6px;
  background: var(--accent); border-radius: 50%;
}
.edit-grid .cell.is-empty { color: var(--text-ter); font-style: italic; }
.edit-grid tr.is-weekend { background: rgba(127,127,127,0.04); }

/* Modal */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.45);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0;
  transition: opacity 0.2s;
}
.modal-backdrop.show { opacity: 1; }
.modal {
  background: var(--card);
  border-radius: 16px;
  padding: 22px;
  max-width: 440px; width: 100%;
  transform: scale(0.96);
  transition: transform 0.2s;
}
.modal-backdrop.show .modal { transform: scale(1); }
.modal-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; color: var(--text); }
.modal-sub { font-size: 13px; color: var(--text-sec); margin-bottom: 16px; }
.modal-field { margin-bottom: 14px; }
.modal-field label {
  display: block;
  font-size: 12px; color: var(--text-sec);
  font-weight: 500;
  margin-bottom: 5px;
}
.modal-field input, .modal-field textarea {
  width: 100%;
  padding: 10px 12px;
  border: 0.5px solid var(--separator);
  border-radius: 10px;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  box-sizing: border-box;
  -webkit-appearance: none;
}
.modal-field input:focus, .modal-field textarea:focus {
  outline: none;
  border-color: var(--accent);
}
.modal-field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
.modal-actions {
  display: flex; gap: 10px;
  justify-content: flex-end;
  margin-top: 18px;
}
.modal-btn {
  padding: 9px 18px;
  border-radius: 999px;
  font-size: 14px; font-weight: 500;
  cursor: pointer; font-family: inherit;
  -webkit-appearance: none;
  border: none;
}
.modal-btn-cancel { background: var(--separator); color: var(--text); }
.modal-btn-save { background: var(--accent); color: white; }

/* Toast */
.toast {
  position: fixed; left: 50%; transform: translateX(-50%);
  bottom: 32px;
  background: rgba(0,0,0,0.88);
  color: white;
  padding: 11px 20px;
  border-radius: 999px;
  font-size: 14px;
  z-index: 300;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
  max-width: 90vw;
  text-align: center;
}
.toast.show { opacity: 1; }
.toast.error { background: rgba(207, 48, 48, 0.95); }
</style>
</head>
<body>
<div id="app" class="app"></div>

function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"})[c]); }

function el(tag, props, ...kids) {
  const e = document.createElement(tag);
  if (props) for (const [k, v] of Object.entries(props)) {
    if (v == null) continue;
    if (k === "class") e.className = v;
    else if (k === "style" && typeof v === "object") Object.assign(e.style, v);
    else if (k === "html") e.innerHTML = v;
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k in e && typeof v !== "boolean") e[k] = v;
    else e.setAttribute(k, v);
  }
  for (const k of kids) {
    if (k == null || k === false) continue;
    e.appendChild(typeof k === "string" ? document.createTextNode(k) : k);
  }
  return e;
}

function iconSpan(name, extraClass) {
  return el("span", { class: "icon" + (extraClass ? " " + extraClass : ""), html: ICONS[name] || "" });
}

function parseDate(iso) { const [y,m,d] = iso.split("-").map(Number); return new Date(y, m-1, d); }
const MONTHS_LONG = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
const MONTHS_SHORT = ["janv.","févr.","mars","avr.","mai","juin","juil.","août","sept.","oct.","nov.","déc."];
function fmtDateRange(s, e) {
  const ds = parseDate(s), de = parseDate(e);
  if (ds.getMonth() === de.getMonth()) return `${ds.getDate()} → ${de.getDate()} ${MONTHS_LONG[ds.getMonth()]}`;
  return `${ds.getDate()} ${MONTHS_SHORT[ds.getMonth()]} → ${de.getDate()} ${MONTHS_SHORT[de.getMonth()]}`;
}
function fmtDateSingle(iso) { const d = parseDate(iso); return `${d.getDate()} ${MONTHS_LONG[d.getMonth()]}`; }
function daysBetween(d1, d2) { return Math.round((d2 - d1) / (1000*60*60*24)); }
function nightsFromRange(s, e) { return Math.max(1, daysBetween(parseDate(s), parseDate(e))); }
function shiftDate(iso, days) {
  const d = parseDate(iso); d.setDate(d.getDate() + days);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function userById(id) { return DATA.users.find(u => u.id === id); }

function avatarEl(u, extraClass) {
  const cls = `avatar r-${u.ramp}` + (u.photo ? " has-photo" : "") + (extraClass ? " " + extraClass : "");
  if (u.photo) return el("div", { class: cls }, el("img", { src: u.photo, alt: u.nom }));
  return el("div", { class: cls }, u.initials || u.nom[0]);
}
function trajetIcon(type) { return ({vol:"plane",train:"train",voiture:"car"})[type] || "transfert"; }

const YEAR_DEFAULT = 2026;
const USER_COL_IDX = { anatole: 2, auguste: 3, sixtine: 4, carole: 5, jal: 6 };
const ROUTINE_ACTS = new Set([
  "WeekEnd Dubai","Boulot Dubai","Ecole Dubai","Dubai",
  "Dubai - Off","Stage ou Petit Boulot","School Start"
]);
function isRoutine(act) { return !act || ROUTINE_ACTS.has(act); }
function isTrajet(act) {
  if (!act) return false;
  if (/^(Flight|Vol|Fly|Train|TGV|TER)\b/i.test(act)) return true;
  if (/^[A-Za-zÀ-ÿ]+(?:-[A-Za-zÀ-ÿ]+)+$/.test(act)) return true;
  return false;
}
function isTentatif(act) { return !!(act && act.trim().endsWith("?")); }
function cleanTitre(act) { return act.replace(/\s*\?+\s*$/, '').trim(); }
function visualTitre(act) {
  let s = act.trim().replace(/^Flight\s+/i, 'Vol ');
  // Hyphenated route: insert " → "
  if (/[A-Za-zÀ-ÿ]+(?:-[A-Za-zÀ-ÿ]+)+/.test(s)) {
    const parts = s.split(/\s+/);
    const idx = parts.findIndex(p => /[A-Za-zÀ-ÿ]+-[A-Za-zÀ-ÿ]+/.test(p));
    if (idx >= 0) parts[idx] = parts[idx].replace(/-/g, ' → ');
    return parts.join(' ');
  }
  return s;
}

const RE_REF = /Booking reference:\s*([A-Z0-9]+)/i;
const RE_FNUM = /\b([A-Z]{1,3})\s*(\d{3,5})\s+(?:Sun|Mon|Tue|Wed|Thu|Fri|Sat)\b/;
const RE_COMP = /\b(Emirates|Air France|Aer Lingus|Volotea|Ryanair|TGV Inoui|TGV|SNCF)\b/i;
const RE_DEP1 = /Flight departure time:\s*([0-9]{1,2}[:h;][0-9]{2})/i;
const RE_DEP2 = /Departure\s*\([^)]+\):\s*([0-9]{1,2}[:h;][0-9]{2})/i;
const RE_ARR1 = /Flight arrival date time:\s*([0-9]{1,2}[:h;][0-9]{2})/i;
const RE_ARR2 = /Arrival\s*\([^)]+\):\s*([0-9]{1,2}[:h;][0-9]{2})/i;
const RE_ORIG = /Origin:\s*([^\n(]+)\s*\(([A-Z]{3})\)/;
const RE_DEST = /Destination:\s*([^\n(]+)\s*\(([A-Z]{3})\)/;
const RE_COST = /Cost:\s*([A-Z]{2,4}\s*[0-9,]+(?:\.\d+)?)/i;
function parseTrajetNote(note) {
  if (!note) return {};
  const out = {}; let m;
  if (m = RE_REF.exec(note)) out.reference = m[1];
  if (m = RE_FNUM.exec(note)) out.vol = m[1] + " " + m[2];
  if (m = RE_COMP.exec(note)) out.compagnie = m[1];
  if ((m = RE_DEP1.exec(note)) || (m = RE_DEP2.exec(note))) out.heureDepart = m[1].replace(/[h;]/, ':');
  if ((m = RE_ARR1.exec(note)) || (m = RE_ARR2.exec(note))) out.heureArrivee = m[1].replace(/[h;]/, ':');
  if (m = RE_ORIG.exec(note)) out.origine = m[1].trim() + " (" + m[2] + ")";
  if (m = RE_DEST.exec(note)) out.destination = m[1].trim() + " (" + m[2] + ")";
  if (m = RE_COST.exec(note)) out.cost = m[1].trim();
  return out;
}
function trajetType(act, info) {
  if (/^(Flight|Vol|Fly)\b/i.test(act)) return "vol";
  if (info.compagnie && /Emirates|Air France|Aer Lingus|Volotea|Ryanair/i.test(info.compagnie)) return "vol";
  if (/^(Train|TGV|TER)\b/i.test(act)) return "train";
  if (info.compagnie && /TGV/i.test(info.compagnie)) return "train";
  return "transfert";
}

function computeStretches(userId) {
  const colIdx = USER_COL_IDX[userId];
  if (colIdx == null) return [];
  const out = []; let cur = null;
  for (const row of DATA.d) {
    const date = `${YEAR_DEFAULT}-${row[0]}`;
    const act = row[colIdx];
    if (isRoutine(act) || isTrajet(act)) {
      if (cur) { out.push(cur); cur = null; }
      continue;
    }
    const clean = cleanTitre(act); const tentatif = isTentatif(act);
    if (cur && cur.clean === clean && cur.tentatif === tentatif) {
      cur.end = date; cur.days++;
    } else {
      if (cur) out.push(cur);
      cur = { start: date, end: date, clean, tentatif, days: 1 };
    }
  }
  if (cur) out.push(cur);
  return out;
}

function findSejourOthers(titre, dateStart, dateEnd, viewerId) {
  // Chevauchement : un autre user est "co-présent" si un de ses stretches au même
  // titre chevauche la fenêtre du viewer (même partiellement).
  const others = [];
  for (const u of DATA.users) {
    if (u.id === viewerId) continue;
    if (computeStretches(u.id).some(s =>
      s.clean === titre && s.start <= dateEnd && s.end >= dateStart
    )) {
      others.push(u.id);
    }
  }
  return others;
}

function computeItems(userId) {
  const items = [];
  // Séjours pour ce user
  for (const s of computeStretches(userId)) {
    const others = findSejourOthers(s.clean, s.start, s.end, userId);
    const enrich = (DATA.enrichissements || {})[s.clean] || {};
    items.push({
      kind: "sejour",
      date: s.start, dateEnd: s.end,
      obj: {
        titre: s.clean,
        dateStart: s.start, dateEnd: s.end,
        tentatif: s.tentatif,
        participants: [userId, ...others],
        adresse: enrich.adresse || "",
        gmapsUrl: enrich.gmapsUrl || "",
        contact: enrich.contact || "",
        notes: enrich.notes || "",
        docs: enrich.docs || []
      }
    });
  }
  // Trajets pour ce user
  const colIdx = USER_COL_IDX[userId];
  for (const row of DATA.d) {
    const date = `${YEAR_DEFAULT}-${row[0]}`;
    const act = row[colIdx];
    if (!isTrajet(act)) continue;
    const note = (DATA.c || {})[`${date}|${userId}`] || "";
    const info = parseTrajetNote(note);
    // Co-voyageurs : même date + même numéro de vol (ex. EK 089), ou fallback
    // même activité texte si aucun n'a de numéro de vol (cas des trajets non-aériens).
    const others = [];
    for (const u of DATA.users) {
      if (u.id === userId) continue;
      const u_act = row[USER_COL_IDX[u.id]];
      if (!isTrajet(u_act)) continue;
      const u_info = parseTrajetNote((DATA.c || {})[`${date}|${u.id}`] || "");
      if (info.vol && u_info.vol) {
        if (info.vol === u_info.vol) others.push(u.id);
      } else if (!info.vol && !u_info.vol && u_act === act) {
        others.push(u.id);
      }
    }
    // Docs : merge ceux de tous les co-voyageurs (dédup par URL)
    const mergedDocs = []; const seenUrls = new Set();
    for (const p of [userId, ...others]) {
      const pDocs = (DATA.docs_trajets || {})[`${date}|${p}`] || [];
      for (const d of pDocs) {
        if (d.url && !seenUrls.has(d.url)) { seenUrls.add(d.url); mergedDocs.push(d); }
      }
    }
    items.push({
      kind: "trajet",
      date, dateEnd: date,
      obj: {
        titre: visualTitre(act),
        type: trajetType(act, info),
        date,
        heureDepart: info.heureDepart || "",
        heureArrivee: info.heureArrivee || "",
        origine: info.origine || "",
        destination: info.destination || "",
        compagnie: info.compagnie || "",
        vol: info.vol || "",
        reference: info.reference || "",
        cost: info.cost || "",
        notes: note,
        participants: [userId, ...others],
        docs: mergedDocs
      }
    });
  }
  items.sort((a, b) => a.date.localeCompare(b.date) || (a.kind === "trajet" ? -1 : 1));

  // Bridges "À Dubai / Boulot Dubai" : entre 2 events, si que des routines Dubai
  // pendant ≥ 2 jours, crée un séjour intermédiaire avec le titre dominant.
  if (colIdx != null && items.length >= 2) {
    const bridges = [];
    for (let i = 0; i < items.length - 1; i++) {
      const aEndIso = items[i].dateEnd, bStartIso = items[i + 1].date;
      const aEnd = parseDate(aEndIso), bStart = parseDate(bStartIso);
      const gap = daysBetween(aEnd, bStart) - 1;
      if (gap < 2) continue;  // au moins 2 jours pour mériter un pill
      const gapStartIso = shiftDate(aEndIso, 1);
      const gapEndIso = shiftDate(bStartIso, -1);
      const counts = {}; let allRoutine = true;
      for (const row of DATA.d) {
        const dateIso = `${YEAR_DEFAULT}-${row[0]}`;
        if (dateIso < gapStartIso || dateIso > gapEndIso) continue;
        const act = row[colIdx];
        if (!isRoutine(act)) { allRoutine = false; break; }
        counts[act] = (counts[act] || 0) + 1;
      }
      if (!allRoutine) continue;
      // Titre = activité la plus fréquente, fallback "À Dubai"
      let titre = "À Dubai";
      const sorted = Object.entries(counts).sort((x, y) => y[1] - x[1]);
      if (sorted.length > 0) titre = sorted[0][0];
      bridges.push({
        kind: "sejour",
        date: gapStartIso, dateEnd: gapEndIso,
        obj: {
          titre, dateStart: gapStartIso, dateEnd: gapEndIso,
          tentatif: false, participants: [userId],
          adresse: "", gmapsUrl: "", contact: "", notes: "", docs: []
        }
      });
    }
    items.push(...bridges);
    items.sort((a, b) => a.date.localeCompare(b.date) || (a.kind === "trajet" ? -1 : 1));
  }

  return items;
}

function chipText(participants, viewerId) {
  const others = participants.filter(p => p !== viewerId);
  if (others.length === 0) return null;
  if (others.length === DATA.users.length - 1) return "Famille au complet";
  const noms = others.map(p => userById(p)?.nom).filter(Boolean);
  if (noms.length === 1) return `avec ${noms[0]}`;
  if (noms.length === 2) return `avec ${noms[0]} et ${noms[1]}`;
  return `avec ${noms.slice(0,-1).join(", ")} et ${noms[noms.length-1]}`;
}

function getRoute() {
  const p = new URLSearchParams(location.search);
  return { edit: p.has("edit"), user: p.get("user") };
}
function navTo(params) {
  const url = new URL(location.href);
  [...url.searchParams.keys()].forEach(k => url.searchParams.delete(k));
  Object.entries(params).forEach(([k,v]) => { if (v != null) url.searchParams.set(k, v); });
  history.pushState({}, "", url.toString());
  render();
  window.scrollTo(0, 0);
}

function render() {
  const r = getRoute();
  if (r.edit) renderEdit();
  else if (r.user) renderProgramme(r.user);
  else renderHome();
}

function renderHome() {
  document.body.classList.remove("edit-mode");
  const app = document.getElementById("app"); app.innerHTML = "";
  const screen = el("div", { class: "screen" });
  screen.appendChild(el("div", { class: "home-subtitle" }, DATA.meta.family));
  screen.appendChild(el("h1", { class: "home-title", style: { marginBottom: "32px" } }, DATA.meta.title));

  const grid = el("div", { class: "avatar-grid" });
  const rowParents = el("div", { class: "avatar-row" });
  const rowKids = el("div", { class: "avatar-row" });
  DATA.users.forEach((u, i) => {
    const cell = el("a", {
      class: "avatar-cell", href: `?user=${u.id}`,
      onClick: (e) => { e.preventDefault(); navTo({ user: u.id }); },
    },
      avatarEl(u),
      el("div", { class: "avatar-name" }, u.nom),
    );
    (i < 2 ? rowParents : rowKids).appendChild(cell);
  });
  grid.appendChild(rowParents);
  grid.appendChild(rowKids);
  screen.appendChild(grid);
  app.appendChild(screen);
  app.appendChild(renderCalendar());
}

function renderProgramme(userId) {
  document.body.classList.remove("edit-mode");
  const user = userById(userId);
  if (!user) { navTo({}); return; }
  const app = document.getElementById("app"); app.innerHTML = "";

  const hdr = el("div", { class: "prog-header" });
  const backRow = el("div", { class: "back-row" });
  backRow.appendChild(el("a", {
    class: "back-btn", href: "?",
    onClick: (e) => { e.preventDefault(); navTo({}); },
  }, iconSpan("back"), "Famille"));
  const sw = el("div", { class: "user-switch" });
  for (const u of DATA.users) {
    const inner = u.photo ? el("img", { src: u.photo, alt: u.nom }) : (u.initials || u.nom[0]);
    sw.appendChild(el("a", {
      class: `avatar r-${u.ramp}` + (u.photo ? " has-photo" : "") + (u.id === userId ? " is-current" : ""),
      href: `?user=${u.id}`,
      onClick: (e) => { e.preventDefault(); navTo({ user: u.id }); },
    }, inner));
  }
  backRow.appendChild(sw);
  hdr.appendChild(backRow);
  hdr.appendChild(el("div", { class: "prog-eyebrow" }, "Programme"));
  hdr.appendChild(el("h1", { class: "prog-title" }, `L'été de ${user.nom}`));
  app.appendChild(hdr);

  const items = computeItems(userId);

  if (items.length === 0) {
    app.appendChild(el("div", { class: "empty-state" }, `Rien de planifié pour ${user.nom} cet été.`));
    return;
  }

  // Bande "À Dubai jusqu'au..." AVANT le banner
  const firstIso = items[0].date;
  const lastIso = items[items.length - 1].dateEnd;
  if (firstIso > DATA.meta.dateStart) {
    const endIso = shiftDate(firstIso, -1);
    app.appendChild(el("div", { class: "context-band" },
      iconSpan("home"),
      el("span", null,
        el("span", { class: "context-band-label" }, "À Dubai "),
        `jusqu'au ${fmtDateSingle(endIso)}`)
    ));
  }

  let nextIdx = -1, currentIdx = -1;
  for (let i = 0; i < items.length; i++) {
    const start = parseDate(items[i].date), end = parseDate(items[i].dateEnd);
    if (TODAY >= start && TODAY <= end) { currentIdx = i; break; }
    if (TODAY < start && nextIdx === -1) nextIdx = i;
  }

  if (currentIdx >= 0) {
    app.appendChild(renderBanner("Maintenant", items[currentIdx]));
  } else if (nextIdx >= 0) {
    const d = daysBetween(TODAY, parseDate(items[nextIdx].date));
    const lbl = d === 0 ? "Aujourd'hui" : d === 1 ? "Demain" : `Prochain événement · dans ${d} jours`;
    app.appendChild(renderBanner(lbl, items[nextIdx]));
  } else {
    app.appendChild(el("div", { class: "next-card" },
      el("div", { class: "next-eyebrow" }, "Été terminé"),
      el("div", { class: "next-title", html: "À l'année prochaine !" }),
    ));
  }

  const cards = el("div", { class: "cards" });
  for (const it of items) cards.appendChild(renderCard(it, userId, parseDate(it.dateEnd) < TODAY));
  app.appendChild(cards);

  if (lastIso < DATA.meta.dateEnd) {
    const startIso = shiftDate(lastIso, 1);
    app.appendChild(el("div", { class: "context-band" },
      iconSpan("home"),
      el("span", null,
        el("span", { class: "context-band-label" }, "À Dubai "),
        `à partir du ${fmtDateSingle(startIso)}`)
    ));
  }
}

function renderBanner(label, item) {
  const o = item.obj;
  const ic = item.kind === "sejour" ? "home" : trajetIcon(o.type);
  const meta = item.kind === "sejour"
    ? `${fmtDateRange(o.dateStart, o.dateEnd)} · ${nightsFromRange(o.dateStart, o.dateEnd)} nuits`
    : `${fmtDateSingle(o.date)}${o.heureDepart ? ` · ${o.heureDepart} → ${o.heureArrivee || ''}` : ''}`;
  return el("div", { class: "next-card" },
    el("div", { class: "next-eyebrow" }, label),
    el("div", { class: "next-title" }, iconSpan(ic), el("span", null, o.titre)),
    el("div", { class: "next-meta" }, meta),
  );
}

function renderCard(item, userId, isPast) {
  const o = item.obj;
  const isSejour = item.kind === "sejour";
  const ic = isSejour ? "home" : trajetIcon(o.type);
  const card = el("div", {
    class: "card" + (isPast ? " is-past" : "") + (isSejour && o.tentatif ? " is-tentatif" : ""),
  });

  const titleEl = el("span", { class: "card-title" }, o.titre);
  if (isSejour && o.tentatif) titleEl.appendChild(el("span", { class: "tentatif-badge" }, "à confirmer"));
  const titleRow = el("div", { class: "card-row" }, iconSpan(ic, "card-icon"), titleEl);
  card.appendChild(titleRow);

  const meta = isSejour
    ? `${fmtDateRange(o.dateStart, o.dateEnd)} · ${nightsFromRange(o.dateStart, o.dateEnd)} nuits`
    : `${fmtDateSingle(o.date)}${o.heureDepart ? ` · ${o.heureDepart} → ${o.heureArrivee || ''}` : ''}`;
  card.appendChild(el("div", { class: "card-meta" }, meta));

  const chip = chipText(o.participants, userId);
  if (chip) {
    card.appendChild(el("div", { class: "card-chips" },
      el("span", { class: "chip" }, iconSpan("users"), el("span", null, chip))));
  }

  const expanded = el("div", { class: "card-expand", style: { display: "none" } });
  buildExpand(expanded, item);
  card.appendChild(expanded);

  card.addEventListener("click", () => {
    const open = card.dataset.expanded === "true";
    expanded.style.display = open ? "none" : "flex";
    card.dataset.expanded = open ? "false" : "true";
    card.classList.toggle("is-expanded", !open);
  });

  return card;
}

function buildExpand(container, item) {
  const o = item.obj;
  const isSejour = item.kind === "sejour";

  if (isSejour) {
    // Adresse + maps
    const adrBlock = el("div");
    if (o.adresse) {
      adrBlock.appendChild(el("div", { class: "field-label" }, "Adresse"));
      adrBlock.appendChild(el("div", { class: "field-value" }, o.adresse));
    }
    const mapsQ = o.gmapsUrl || `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(o.adresse || o.titre)}`;
    const mapsLabel = o.adresse ? "Ouvrir dans Maps" : "Chercher dans Maps";
    adrBlock.appendChild(el("a", { class: "btn-maps", href: mapsQ, target: "_blank", rel: "noopener" },
      iconSpan("mappin"), el("span", null, mapsLabel)));
    container.appendChild(adrBlock);

    if (o.notes) container.appendChild(blockField("Notes", o.notes));
    if (o.contact) {
      const c = el("div");
      c.appendChild(el("div", { class: "field-label" }, "Contact"));
      c.appendChild(el("div", { class: "contact-row" }, iconSpan("phone"), el("span", null, o.contact)));
      container.appendChild(c);
    }
  } else {
    // Trajet fields
    const lines = [];
    if (o.origine && o.destination) lines.push(["Trajet", `${o.origine} → ${o.destination}`]);
    if (o.compagnie) lines.push(["Compagnie", o.compagnie]);
    if (o.vol) lines.push(["Numéro", o.vol]);
    if (o.reference) lines.push(["Référence booking", o.reference]);
    if (o.cost) lines.push(["Coût", o.cost]);
    for (const [lbl, val] of lines) container.appendChild(blockField(lbl, val));
    if (o.notes) container.appendChild(blockField("Notes", o.notes));
  }

  if (o.docs && o.docs.length) {
    const d = el("div");
    d.appendChild(el("div", { class: "field-label" }, "Documents"));
    const wrap = el("div");
    for (const doc of o.docs) {
      const url = doc.url || `docs/${doc.file}`;
      // target="_blank" natif : iOS PWA ouvre dans Safari (out-of-app), Safari normal en nouvel onglet.
      // Pas de window.open() qui casse le routing en mode PWA.
      const pill = el("a", {
        class: "doc-pill",
        href: url, target: "_blank", rel: "noopener noreferrer external",
      }, iconSpan("doc"), el("span", null, doc.label || doc.file));
      wrap.appendChild(pill);
    }
    d.appendChild(wrap);
    container.appendChild(d);
  }
}

function blockField(label, value) {
  const b = el("div");
  b.appendChild(el("div", { class: "field-label" }, label));
  b.appendChild(el("div", { class: "field-value" }, value));
  return b;
}

// === Calendrier famille ============================================================
const DOW_FR = ["L", "M", "M", "J", "V", "S", "D"];

function renderCalendar() {
  const wrap = document.createDocumentFragment();
  wrap.appendChild(el("div", { class: "cal-eyebrow" }, "Calendrier famille — tap sur un jour"));
  const cal = el("div", { class: "cal-wrap" });
  const start = parseDate(DATA.meta.dateStart);
  const end = parseDate(DATA.meta.dateEnd);
  const startYM = start.getFullYear() * 12 + start.getMonth();
  const endYM = end.getFullYear() * 12 + end.getMonth();
  for (let ym = startYM; ym <= endYM; ym++) {
    cal.appendChild(renderMonth(Math.floor(ym / 12), ym % 12, start, end));
  }
  wrap.appendChild(cal);
  return wrap;
}

function renderMonth(year, month, dataStart, dataEnd) {
  const monthEl = el("div", { class: "cal-month" });
  monthEl.appendChild(el("div", { class: "cal-month-title" }, `${MONTHS_LONG[month]} ${year}`));

  const dowRow = el("div", { class: "cal-dow" });
  for (const d of DOW_FR) dowRow.appendChild(el("div", null, d));
  monthEl.appendChild(dowRow);

  const days = el("div", { class: "cal-days" });
  const firstOfMonth = new Date(year, month, 1);
  const firstDow = (firstOfMonth.getDay() + 6) % 7; // Lundi = 0
  for (let i = 0; i < firstDow; i++) days.appendChild(el("div", null));

  const daysInMonth = new Date(year, month + 1, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const dateObj = new Date(year, month, d);
    const inRange = dateObj >= dataStart && dateObj <= dataEnd;
    const isToday = dateObj.getTime() === TODAY.getTime();
    const iso = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cls = "cal-day" + (inRange ? "" : " is-out") + (isToday ? " is-today" : "");
    const cell = el("button", {
      class: cls, type: "button",
    }, String(d));
    if (inRange) cell.addEventListener("click", () => openDaySheet(iso));
    days.appendChild(cell);
  }
  monthEl.appendChild(days);
  return monthEl;
}

function openDaySheet(iso) {
  const md = iso.slice(5);
  const row = DATA.d.find(r => r[0] === md);
  if (!row) return;

  const backdrop = el("div", { class: "sheet-backdrop" });
  const sheet = el("div", { class: "sheet" });
  sheet.appendChild(el("div", { class: "sheet-grip" }));
  sheet.appendChild(el("div", { class: "sheet-title" }, fmtDateSingle(iso)));

  for (const u of DATA.users) {
    const act = row[USER_COL_IDX[u.id]] || "";
    sheet.appendChild(el("div", { class: "sheet-row" },
      avatarEl(u),
      el("div", { class: "sheet-row-name" }, u.nom),
      el("div", { class: "sheet-row-act" }, act || "—"),
    ));
  }

  const close = () => {
    backdrop.classList.remove("show");
    sheet.classList.remove("show");
    setTimeout(() => { backdrop.remove(); sheet.remove(); }, 280);
  };
  sheet.appendChild(el("button", { class: "sheet-close", type: "button", onClick: close }, "Fermer"));
  backdrop.addEventListener("click", close);

  document.body.appendChild(backdrop);
  document.body.appendChild(sheet);
  requestAnimationFrame(() => {
    backdrop.classList.add("show");
    sheet.classList.add("show");
  });
}

// === SAVE INFRASTRUCTURE (FSA + IDB) — port de l'OLD index.html ====================
const IDB_NAME = "jalSummerDB", IDB_STORE = "handles", IDB_KEY_HTML = "dashboardHtml";
let HTML_HANDLE = null;
let DIRTY = false;

function idbOpen() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(IDB_NAME, 1);
    r.onupgradeneeded = () => r.result.createObjectStore(IDB_STORE);
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function idbGet(key) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction(IDB_STORE, "readonly");
    const req = tx.objectStore(IDB_STORE).get(key);
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}
async function idbPut(key, v) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction(IDB_STORE, "readwrite");
    tx.objectStore(IDB_STORE).put(v, key);
    tx.oncomplete = () => res();
    tx.onerror = () => rej(tx.error);
  });
}
async function idbDel(key) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction(IDB_STORE, "readwrite");
    tx.objectStore(IDB_STORE).delete(key);
    tx.oncomplete = () => res();
    tx.onerror = () => rej(tx.error);
  });
}
async function ensurePermission(handle) {
  if (!handle) return false;
  try {
    if ((await handle.queryPermission({ mode: "readwrite" })) === "granted") return true;
    return (await handle.requestPermission({ mode: "readwrite" })) === "granted";
  } catch (e) { return false; }
}
async function writeBlobToHandle(handle, blob) {
  const writable = await handle.createWritable();
  await writable.write(blob);
  await writable.close();
}

async function saveDashboardHtml() {
  try {
    let handle = HTML_HANDLE;
    if (!handle && "showSaveFilePicker" in window) {
      try {
        handle = await window.showSaveFilePicker({
          suggestedName: "index.html",
          types: [{ description: "HTML", accept: { "text/html": [".html", ".htm"] } }],
        });
        HTML_HANDLE = handle;
        idbPut(IDB_KEY_HTML, handle).catch(e => console.warn("[save] idbPut failed", e));
      } catch (e) {
        if (e.name === "AbortError") { showToast("Sauvegarde annulée"); return false; }
        throw e;
      }
    }
    const dataJson = JSON.stringify(DATA);
    let currentHtml;
    if (handle) {
      if (!(await ensurePermission(handle))) throw new Error("Permission refusée");
      const file = await handle.getFile();
      currentHtml = await file.text();
    } else {
      currentHtml = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
    }
    if (!currentHtml || currentHtml.length < 1000) {
      throw new Error(`Doc trop petit (${currentHtml.length} octets)`);
    }
    let newHtml = currentHtml.replace(
      /let DATA\s*=\s*\{[\s\S]*?\};(?=\s*\n\s*const TODAY)/m,
      `let DATA = ${dataJson};`
    );
    if (newHtml === currentHtml) {
      newHtml = currentHtml.replace(/let DATA\s*=\s*\{[\s\S]*?\};/m, `let DATA = ${dataJson};`);
      if (newHtml === currentHtml) throw new Error("Pattern 'let DATA = {...};' introuvable");
    }
    if (newHtml.length < 1000) throw new Error(`HTML résultant trop petit (${newHtml.length})`);
    const blob = new Blob([newHtml], { type: "text/html" });
    if (handle) {
      await writeBlobToHandle(handle, blob);
      markSaved();
      showToast(`Sauvé · ${(newHtml.length/1024).toFixed(1)} KB`);
      return true;
    }
    // Fallback download
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "index.html";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    markSaved();
    showToast(`Téléchargé · à déplacer vers index.html`);
    return true;
  } catch (e) {
    console.error(e);
    showToast(`Échec : ${e.message}`, true);
    return false;
  }
}

function showToast(msg, isError) {
  let t = document.querySelector(".toast");
  if (!t) { t = el("div", { class: "toast" }); document.body.appendChild(t); }
  t.textContent = msg;
  t.className = "toast show" + (isError ? " error" : "");
  clearTimeout(t._tid);
  t._tid = setTimeout(() => { t.className = "toast" + (isError ? " error" : ""); }, 3500);
}

// Reusable docs field builder. Mutates the docs array in-place.
function buildDocsField(docs, label, placeholder) {
  const f = el("div", { class: "modal-field" });
  f.appendChild(el("label", null, label || "Documents"));
  const list = el("div");
  function renderList() {
    list.innerHTML = "";
    docs.forEach((doc, i) => {
      const pill = el("div", { class: "doc-pill-edit" });
      const inLabel = el("input", { type: "text", placeholder: "Libellé", value: doc.label || "" });
      const inUrl = el("input", { type: "text", placeholder: placeholder || "docs/fichier.pdf", value: doc.url || doc.file || "" });
      inLabel.addEventListener("input", () => { docs[i].label = inLabel.value; });
      inUrl.addEventListener("input", () => { docs[i].url = inUrl.value; });
      pill.appendChild(inLabel);
      pill.appendChild(inUrl);
      pill.appendChild(el("button", { class: "doc-remove", type: "button", title: "Supprimer", onClick: () => { docs.splice(i, 1); renderList(); } }, "×"));
      list.appendChild(pill);
    });

  f.appendChild(list);
  f.appendChild(el("button", { class: "doc-add-btn", type: "button", onClick: () => { docs.push({ label: "", url: "" }); renderList(); } }, "+ Ajouter un document"));

}

function openCellEditor(rowIdx, userId) {
  const row = DATA.d[rowIdx];

  const currentAct = row[colIdx] || "";

  const inputAct = el("input", { type: "text", value: currentAct, placeholder: "Ex: Lacanau chez Esteban" });
  fAct.appendChild(inputAct);
  modal.appendChild(fAct);

  const fNote = el("div", { class: "modal-field" });
  fNote.appendChild(el("label", null, "Note (détails billets, contacts, etc.)"));

  fNote.appendChild(inputNote);
  modal.appendChild(fNote);

  // Documents trajet (PDFs liés au booking) — seulement si la cellule est un trajet
  let trajetDocs = null;

    const currentDocs = ((DATA.docs_trajets || {})[noteKey] || []).map(d => ({...d}));

    modal.appendChild(buildDocsField(trajetDocs, "Documents (PDFs pour ce trajet)", "docs/billet-ek077.pdf"));
  }

  // Enrichissement séjour — pour les cellules de séjour (ni routine, ni trajet, ni vide)
  let sejourEnrich = null;
  const isSejourCell = currentAct && !isRoutine(currentAct) && !isTrajet(currentAct);
  if (isSejourCell) {
    modal.classList.add("is-large");
    const titre = cleanTitre(currentAct);
    const cur = ((DATA.enrichissements || {})[titre]) || {};
    const docsArr = Array.isArray(cur.docs) ? cur.docs.map(d => ({...d})) : [];

    const sep = el("div", { style: { marginTop: "18px", paddingTop: "16px", borderTop: "0.5px solid var(--separator)" } });
    sep.appendChild(el("div", { style: { fontSize: "12px", color: "var(--text-sec)", letterSpacing: "0.3px", marginBottom: "14px", fontWeight: "500" } },
      `Infos du séjour "${titre}" (s'appliquent à toute sa durée)`));
    modal.appendChild(sep);

    const fAdr = el("div", { class: "modal-field" });
    fAdr.appendChild(el("label", null, "Adresse"));

    fAdr.appendChild(inAdr);
    modal.appendChild(fAdr);

    const fMap = el("div", { class: "modal-field" });
    fMap.appendChild(el("label", null, "Lien Google Maps (optionnel — auto-recherche par titre sinon)"));
    const inMap = el("input", { type: "url", placeholder: "https://maps.google.com/?q=...", value: cur.gmapsUrl || "" });
    fMap.appendChild(inMap);
    modal.appendChild(fMap);

    const fCont = el("div", { class: "modal-field" });
    fCont.appendChild(el("label", null, "Contact"));
    const inCont = el("input", { type: "text", placeholder: "Esteban — 06 12 34 56 78", value: cur.contact || "" });
    fCont.appendChild(inCont);
    modal.appendChild(fCont);

    const fGenNote = el("div", { class: "modal-field" });
    fGenNote.appendChild(el("label", null, "Notes générales (Hôtel, WiFi, infos pratiques)"));
    const inGenNote = el("textarea", { placeholder: "Stay at Bristol Hotel Geneva, check-in 15h, wifi: BristolGuest", rows: 4 });
    inGenNote.value = cur.notes || "";
    fGenNote.appendChild(inGenNote);
    modal.appendChild(fGenNote);

    modal.appendChild(buildDocsField(docsArr, "Documents PDF (séjour)", "docs/hotel-confirmation.pdf"));

    sejourEnrich = { titre, inAdr, inMap, inCont, inGenNote, docsArr, prev: cur };

  const close = () => { backdrop.classList.remove("show"); setTimeout(() => backdrop.remove(), 220); };
  const save = () => {
    const newAct = inputAct.value.trim();
    const newNote = inputNote.value;
    let changed = false;
    if (newAct !== currentAct) {
      DATA.d[rowIdx][colIdx] = newAct;
      changed = true;
    }
    if (newNote !== currentNote) {
      if (!DATA.c) DATA.c = {};
      if (newNote.trim() === "") delete DATA.c[noteKey];
      else DATA.c[noteKey] = newNote;
      changed = true;
    }
    if (trajetDocs !== null) {
      const cleanDocs = trajetDocs
        .filter(d => d.url && d.url.trim())
        .map(d => ({ label: d.label.trim() || d.url.trim().split('/').pop(), url: d.url.trim() }));
      const prevDocs = (DATA.docs_trajets || {})[noteKey] || [];
      if (JSON.stringify(cleanDocs) !== JSON.stringify(prevDocs)) {
        if (!DATA.docs_trajets) DATA.docs_trajets = {};
        if (cleanDocs.length === 0) delete DATA.docs_trajets[noteKey];
        else DATA.docs_trajets[noteKey] = cleanDocs;
        changed = true;
      }

    if (sejourEnrich) {
      const { titre, inAdr, inMap, inCont, inGenNote, docsArr, prev } = sejourEnrich;

        .map(d => ({ label: d.label.trim() || d.url.trim().split('/').pop(), url: d.url.trim() }));
      const newE = {
        adresse: inAdr.value.trim(),
        gmapsUrl: inMap.value.trim(),
        contact: inCont.value.trim(),
        notes: inGenNote.value.trim(),
        docs: cleanDocs,
      };
      const hasContent = newE.adresse || newE.gmapsUrl || newE.contact || newE.notes || cleanDocs.length > 0;
      const prevStr = JSON.stringify({ adresse: prev.adresse || "", gmapsUrl: prev.gmapsUrl || "", contact: prev.contact || "", notes: prev.notes || "", docs: prev.docs || [] });
      const newStr = JSON.stringify(newE);
      if (prevStr !== newStr) {
        if (!DATA.enrichissements) DATA.enrichissements = {};
        if (hasContent) DATA.enrichissements[titre] = newE;
        else delete DATA.enrichissements[titre];
        changed = true;
      }
    }
    if (changed) { markDirty(); renderEdit(); }
    close();
  };

  const actions = el("div", { class: "modal-actions" });
  actions.appendChild(el("button", { class: "modal-btn modal-btn-cancel", onClick: close }, "Annuler"));
  actions.appendChild(el("button", { class: "modal-btn modal-btn-save", onClick: save }, "Enregistrer"));
  modal.appendChild(actions);

  inputAct.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); save(); }
    else if (e.key === "Escape") close();
  });

  backdrop.addEventListener("click", (e) => { if (e.target === backdrop) close(); });
  backdrop.appendChild(modal);
  document.body.appendChild(backdrop);
  requestAnimationFrame(() => backdrop.classList.add("show"));
  setTimeout(() => { inputAct.focus(); inputAct.select(); }, 100);
}

// === Day editor : changer date / supprimer un jour =================================
function openDayEditor(rowIdx) {
  const row = DATA.d[rowIdx];
  const md = row[0];
  const isoDate = `2026-${md}`;
  const dateLabel = `${DOW_LONG_FR[row[1]] || row[1]} ${parseInt(md.slice(3))} ${MONTHS_LONG[parseInt(md.slice(0,2)) - 1]} 2026`;

  const backdrop = el("div", { class: "modal-backdrop" });
  const modal = el("div", { class: "modal" });
  modal.appendChild(el("div", { class: "modal-title" }, "Modifier le jour"));
  modal.appendChild(el("div", { class: "modal-sub" }, dateLabel));

  const fDate = el("div", { class: "modal-field" });
  fDate.appendChild(el("label", null, "Date"));
  const inputDate = el("input", { type: "date", value: isoDate });
  fDate.appendChild(inputDate);
  modal.appendChild(fDate);

  // Warning + delete button
  const dangerBlock = el("div", { style: { marginTop: "20px", padding: "12px 14px", background: "rgba(207,48,48,0.08)", borderRadius: "10px", border: "0.5px solid rgba(207,48,48,0.3)" } });
  dangerBlock.appendChild(el("div", { style: { fontSize: "13px", color: "var(--text-sec)", marginBottom: "10px" } }, "Supprimer ce jour effacera toutes ses activités et notes."));
  const delBtn = el("button", { class: "modal-btn", style: { background: "rgb(207,48,48)", color: "white", width: "100%" }, onClick: () => {
    if (!confirm(`Supprimer ${dateLabel} ? (irréversible avant save)`)) return;
    // Remove all c entries for this date
    const datePrefix = `${YEAR_DEFAULT}-${md}|`;
    Object.keys(DATA.c || {}).forEach(k => { if (k.startsWith(datePrefix)) delete DATA.c[k]; });
    // Remove the row
    DATA.d.splice(rowIdx, 1);
    // Update meta dateStart/dateEnd
    if (DATA.d.length > 0) {
      DATA.meta.dateStart = `${YEAR_DEFAULT}-${DATA.d[0][0]}`;
      DATA.meta.dateEnd = `${YEAR_DEFAULT}-${DATA.d[DATA.d.length-1][0]}`;
    }
    markDirty();
    close();
    renderEdit();
  } }, "Supprimer ce jour");
  dangerBlock.appendChild(delBtn);
  modal.appendChild(dangerBlock);

  const close = () => { backdrop.classList.remove("show"); setTimeout(() => backdrop.remove(), 220); };
  const save = () => {
    const newIso = inputDate.value;
    if (!newIso) { close(); return; }
    if (newIso === isoDate) { close(); return; }
    if (!newIso.startsWith("2026-")) { showToast("Année 2026 uniquement", true); return; }
    const newMd = newIso.slice(5);
    if (DATA.d.some((r, i) => i !== rowIdx && r[0] === newMd)) {
      showToast("Cette date existe déjà", true); return;
    }
    // Update row md + dow
    row[0] = newMd;
    row[1] = dowShort(newIso);
    // Move c entries
    const oldPrefix = `2026-${md}|`;
    const newPrefix = `2026-${newMd}|`;
    Object.keys(DATA.c || {}).forEach(k => {
      if (k.startsWith(oldPrefix)) {
        const newKey = k.replace(oldPrefix, newPrefix);
        DATA.c[newKey] = DATA.c[k]; delete DATA.c[k];
      }
    });
    // Re-sort DATA.d by md
    DATA.d.sort((a, b) => a[0].localeCompare(b[0]));
    // Update meta
    DATA.meta.dateStart = `${YEAR_DEFAULT}-${DATA.d[0][0]}`;
    DATA.meta.dateEnd = `${YEAR_DEFAULT}-${DATA.d[DATA.d.length-1][0]}`;
    markDirty();
    close();
    renderEdit();
  };

  const actions = el("div", { class: "modal-actions" });
  actions.appendChild(el("button", { class: "modal-btn modal-btn-cancel", onClick: close }, "Annuler"));
  actions.appendChild(el("button", { class: "modal-btn modal-btn-save", onClick: save }, "Enregistrer"));
  modal.appendChild(actions);

  backdrop.addEventListener("click", (e) => { if (e.target === backdrop) close(); });
  backdrop.appendChild(modal);
  document.body.appendChild(backdrop);
  requestAnimationFrame(() => backdrop.classList.add("show"));
}

function dowShort(iso) {
  const [y,m,d] = iso.split("-").map(Number);
  const day = new Date(y, m-1, d).getDay();
  return ["Su","Mo","Tu","We","Th","Fr","Sa"][day];
}

// === Enrichissements séjours =====================================================
function uniqueSejourTitles() {
  const map = new Map(); // titre → { dates:[{start,end,users:[]}] }
  for (const u of DATA.users) {
    for (const s of computeStretches(u.id)) {
      if (!map.has(s.clean)) map.set(s.clean, []);
      // Find or create date range entry
      const arr = map.get(s.clean);
      const found = arr.find(x => x.start === s.start && x.end === s.end);
      if (found) found.users.push(u.id);
      else arr.push({ start: s.start, end: s.end, tentatif: s.tentatif, users: [u.id] });
    }
  }
  // Sort by earliest date
  return [...map.entries()]
    .sort((a, b) => a[1][0].start.localeCompare(b[1][0].start))
    .map(([titre, ranges]) => ({ titre, ranges }));
}

  fAdr.appendChild(el("label", null, "Adresse"));
  const inAdr = el("input", { type: "text", placeholder: "12 rue des Pins, Lacanau-Océan" });
  inAdr.value = current.adresse || "";
  fAdr.appendChild(inAdr);
  modal.appendChild(fAdr);

  // Google Maps URL
  const fMap = el("div", { class: "modal-field" });
  fMap.appendChild(el("label", null, "Lien Google Maps (optionnel — auto-généré sinon)"));
  const inMap = el("input", { type: "url", placeholder: "https://maps.google.com/?q=..." });
  inMap.value = current.gmapsUrl || "";
  fMap.appendChild(inMap);
  modal.appendChild(fMap);

  // Contact
  const fCont = el("div", { class: "modal-field" });
  fCont.appendChild(el("label", null, "Contact"));
  const inCont = el("input", { type: "text", placeholder: "Esteban — 06 12 34 56 78" });
  inCont.value = current.contact || "";
  fCont.appendChild(inCont);
  modal.appendChild(fCont);

  // Notes (override)
  const fNote = el("div", { class: "modal-field" });
  fNote.appendChild(el("label", null, "Notes (instructions, infos pratiques)"));
  const inNote = el("textarea", { placeholder: "Clé sous le pot rouge, code WiFi, etc.", rows: 4 });
  inNote.value = current.notes || "";
  fNote.appendChild(inNote);
  modal.appendChild(fNote);

  // Documents (label + url pairs)
  const fDocs = el("div", { class: "modal-field" });
  fDocs.appendChild(el("label", null, "Documents (PDFs hébergés)"));
  const docsList = el("div");
  let docs = Array.isArray(current.docs) ? [...current.docs] : [];
  function renderDocs() {
    docsList.innerHTML = "";
    docs.forEach((doc, i) => {
      const pill = el("div", { class: "doc-pill-edit" });
      const inLabel = el("input", { type: "text", placeholder: "Libellé", value: doc.label || "" });
      const inUrl = el("input", { type: "text", placeholder: "URL ou docs/fichier.pdf", value: doc.url || doc.file || "" });
      inLabel.addEventListener("input", () => { docs[i].label = inLabel.value; });
      inUrl.addEventListener("input", () => { docs[i].url = inUrl.value; });
      pill.appendChild(inLabel);
      pill.appendChild(inUrl);
      pill.appendChild(el("button", { class: "doc-remove", type: "button", title: "Supprimer", onClick: () => { docs.splice(i, 1); renderDocs(); } }, "×"));
      docsList.appendChild(pill);
    });
  }
  renderDocs();
  fDocs.appendChild(docsList);
  fDocs.appendChild(el("button", { class: "doc-add-btn", type: "button", onClick: () => { docs.push({ label: "", url: "" }); renderDocs(); } }, "+ Ajouter un document"));
  modal.appendChild(fDocs);

  const close = () => { backdrop.classList.remove("show"); setTimeout(() => backdrop.remove(), 220); };
  const save = () => {
    const cleanDocs = docs.filter(d => d.url && d.url.trim());
    const adresse = inAdr.value.trim();
    const gmapsUrl = inMap.value.trim();
    const contact = inCont.value.trim();
    const notes = inNote.value.trim();
    if (!adresse && !gmapsUrl && !contact && !notes && cleanDocs.length === 0) {
      // All empty → delete the enrichment entry
      delete DATA.enrichissements[titre];
    } else {
      DATA.enrichissements[titre] = {
        adresse, gmapsUrl, contact, notes,
        docs: cleanDocs.map(d => ({ label: d.label.trim() || d.url.split('/').pop(), url: d.url.trim() })),
      };
    }
    markDirty();
    close();
    renderEdit();
  };

  const actions = el("div", { class: "modal-actions" });
  actions.appendChild(el("button", { class: "modal-btn modal-btn-cancel", onClick: close }, "Annuler"));
  actions.appendChild(el("button", { class: "modal-btn modal-btn-save", onClick: save }, "Enregistrer"));
  modal.appendChild(actions);

  backdrop.addEventListener("click", (e) => { if (e.target === backdrop) close(); });
  backdrop.appendChild(modal);
  document.body.appendChild(backdrop);
  requestAnimationFrame(() => backdrop.classList.add("show"));
  setTimeout(() => inAdr.focus(), 100);
}

// === XLSX Export (port de l'OLD index.html) ======================================
const IDB_KEY_XLSX = "summerXlsx";
let SAVE_HANDLE = null;

(async () => {
  try { const h = await idbGet(IDB_KEY_XLSX); if (h) SAVE_HANDLE = h; } catch (e) {}
})();

function buildXlsxBlob() {
  if (typeof XLSX === "undefined") throw new Error("SheetJS pas chargé (vérifier connexion)");
  const aoa = [[], ["Day","Dates","Anatole","Auguste","Sixtine","Carole","JAL","Dates 2","Day 2"]];
  const DAY_LONG = { Sa:"Saturday", Su:"Sunday", Mo:"Monday", Tu:"Tuesday", We:"Wednesday", Th:"Thursday", Fr:"Friday" };
  for (const r of DATA.d) {
    const md = r[0]; const dt = new Date("2026-" + md + "T00:00");
    const dayName = DAY_LONG[r[1]] || r[1];
    aoa.push([dayName, dt, r[2], r[3], r[4], r[5], r[6], dt, dayName]);
  }
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  // Inject comments from DATA.c
  const COL_LETTER = { anatole:"C", auguste:"D", sixtine:"E", carole:"F", jal:"G" };
  for (const key of Object.keys(DATA.c || {})) {
    const [date, p] = key.split("|");
    const md = date.slice(5);
    const idx = DATA.d.findIndex(r => r[0] === md);
    if (idx < 0) continue;
    const rowNum = idx + 3;
    const cellAddr = COL_LETTER[p] + rowNum;
    if (!ws[cellAddr]) ws[cellAddr] = { t: "s", v: "" };
    ws[cellAddr].c = [{ a: "JAL Dashboard", t: DATA.c[key] }];
  }
  const lastRow = DATA.d.length + 2;
  for (let r = 3; r <= lastRow; r++) for (const col of ["B","H"]) { const ad = col + r; if (ws[ad]) ws[ad].t = "d"; }
  ws["!cols"] = [{wch:11},{wch:12},{wch:32},{wch:32},{wch:28},{wch:24},{wch:18},{wch:12},{wch:11}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Summer 2026");
  const ab = XLSX.write(wb, { bookType: "xlsx", type: "array" });
  return new Blob([ab], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
}

async function exportXlsx() {
  try {
    const blob = buildXlsxBlob();
    let handle = SAVE_HANDLE;
    if (!handle && "showSaveFilePicker" in window) {
      try {
        handle = await window.showSaveFilePicker({
          suggestedName: "Summer 2026.xlsx",
          types: [{ description: "Excel", accept: { "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet": [".xlsx"] } }],
        });
        SAVE_HANDLE = handle;
        idbPut(IDB_KEY_XLSX, handle).catch(e => console.warn("[xlsx] idbPut failed", e));
      } catch (e) {
        if (e.name === "AbortError") { showToast("Export annulé"); return; }
        throw e;
      }
    }
    if (handle) {
      if (!(await ensurePermission(handle))) throw new Error("Permission refusée");
      await writeBlobToHandle(handle, blob);
      showToast(`XLSX exporté · ${(blob.size/1024).toFixed(1)} KB`);
    } else {
      // Fallback download
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = "Summer 2026.xlsx";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      showToast(`XLSX téléchargé · ${(blob.size/1024).toFixed(1)} KB`);
    }
  } catch (e) {
    console.error(e);
    showToast(`Échec XLSX : ${e.message}`, true);
  }
}

// === Add day =====================================================================
function openAddDayEditor() {
  const lastMd = DATA.d.length > 0 ? DATA.d[DATA.d.length - 1][0] : "06-20";
  const lastDate = new Date(`2026-${lastMd}T00:00`);
  lastDate.setDate(lastDate.getDate() + 1);
  const defaultIso = `${lastDate.getFullYear()}-${String(lastDate.getMonth()+1).padStart(2,'0')}-${String(lastDate.getDate()).padStart(2,'0')}`;

  const backdrop = el("div", { class: "modal-backdrop" });
  const modal = el("div", { class: "modal" });
  modal.appendChild(el("div", { class: "modal-title" }, "Ajouter un jour"));
  modal.appendChild(el("div", { class: "modal-sub" }, "Nouveau jour avec cellules vides (à remplir ensuite)"));

  const fDate = el("div", { class: "modal-field" });
  fDate.appendChild(el("label", null, "Date"));
  const inputDate = el("input", { type: "date", value: defaultIso });
  fDate.appendChild(inputDate);
  modal.appendChild(fDate);

  const close = () => { backdrop.classList.remove("show"); setTimeout(() => backdrop.remove(), 220); };
  const save = () => {
    const iso = inputDate.value;
    if (!iso) return;
    if (!iso.startsWith("2026-")) { showToast("Année 2026 uniquement", true); return; }
    const md = iso.slice(5);
    if (DATA.d.some(r => r[0] === md)) { showToast("Cette date existe déjà", true); return; }
    DATA.d.push([md, dowShort(iso), "", "", "", "", ""]);
    DATA.d.sort((a, b) => a[0].localeCompare(b[0]));
    DATA.meta.dateStart = `${YEAR_DEFAULT}-${DATA.d[0][0]}`;
    DATA.meta.dateEnd = `${YEAR_DEFAULT}-${DATA.d[DATA.d.length-1][0]}`;
    markDirty();
    close();
    renderEdit();
  };

  const actions = el("div", { class: "modal-actions" });
  actions.appendChild(el("button", { class: "modal-btn modal-btn-cancel", onClick: close }, "Annuler"));
  actions.appendChild(el("button", { class: "modal-btn modal-btn-save", onClick: save }, "Ajouter"));
  modal.appendChild(actions);

  backdrop.addEventListener("click", (e) => { if (e.target === backdrop) close(); });
  backdrop.appendChild(modal);
  document.body.appendChild(backdrop);
  requestAnimationFrame(() => backdrop.classList.add("show"));
}

window.addEventListener("DOMContentLoaded", render);
window.addEventListener("popstate", render);
