<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Summer 26">
<meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=110da31b">
<link rel="icon" href="apple-touch-icon.png?v=110da31b">
<title>Summer 2026 — Famille Lecointre</title>
<style>
:root {
  --bg: #f2f2f7;
  --card: #ffffff;
  --card-border: rgba(60, 60, 67, 0.12);
  --text: #000000;
  --text-sec: #8e8e93;
  --text-ter: #c7c7cc;
  --accent: #007aff;
  --accent-bg: rgba(0, 122, 255, 0.10);
  --accent-text: #0050b3;
  --separator: rgba(60, 60, 67, 0.18);
  --tentatif: #ff9500;
  --tentatif-bg: rgba(255, 149, 0, 0.10);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #000000;
    --card: #1c1c1e;
    --card-border: rgba(255, 255, 255, 0.08);
    --text: #ffffff;
    --text-sec: #8e8e93;
    --text-ter: #48484a;
    --accent: #0a84ff;
    --accent-bg: rgba(10, 132, 255, 0.18);
    --accent-text: #5ac8fa;
    --separator: rgba(84, 84, 88, 0.6);
    --tentatif: #ff9f0a;
    --tentatif-bg: rgba(255, 159, 10, 0.16);
  }
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.4;
  font-size: 16px;
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
}
.app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
}
.screen { padding: 16px 20px 40px; }

/* HOME */
.home-subtitle { font-size: 15px; font-weight: 500; color: var(--text-sec); margin-top: 12px; }
.home-title { font-size: 28px; font-weight: 600; letter-spacing: -0.4px; margin-top: 2px; }
.home-prompt { font-size: 15px; color: var(--text-sec); margin-top: 6px; margin-bottom: 40px; }

.avatar-grid {
  display: flex; flex-direction: column;
  align-items: center;
  gap: 28px;
  margin-bottom: 40px;
}
.avatar-row { display: flex; justify-content: center; gap: 32px; }
.avatar-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: inherit;
  cursor: pointer;
}

.avatar {
  width: 76px; height: 76px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; font-weight: 600; letter-spacing: -0.5px;
  user-select: none;
}
.avatar-name { font-size: 15px; color: var(--text); font-weight: 400; }
.avatar.has-photo { overflow: hidden; }
.avatar.has-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }

.r-teal   { background: #5DCAA5; color: #04342C; }
.r-pink   { background: #ED93B1; color: #4B1528; }
.r-blue   { background: #85B7EB; color: #042C53; }
.r-green  { background: #97C459; color: #173404; }
.r-purple { background: #AFA9EC; color: #26215C; }
.r-amber  { background: #EF9F27; color: #412402; }
.r-coral  { background: #F0997B; color: #4A1B0C; }

/* PROGRAMME header */
.prog-header { padding: 12px 20px 8px; }
.back-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.back-btn {
  display: inline-flex; align-items: center; gap: 2px;
  color: var(--accent);
  font-size: 16px; padding: 6px 10px 6px 0;
  text-decoration: none; cursor: pointer;
}
.back-btn .icon { width: 24px; height: 24px; display: inline-block; }
.user-switch { display: flex; gap: 8px; align-items: center; }
.user-switch .avatar {
  width: 30px; height: 30px; font-size: 12px; font-weight: 600;
  opacity: 0.6; transition: opacity 0.2s, transform 0.2s;
}
.user-switch .avatar.is-current { width: 36px; height: 36px; font-size: 13px; opacity: 1; }
.prog-eyebrow { font-size: 13px; color: var(--text-sec); margin-top: 14px; }
.prog-title { font-size: 28px; font-weight: 600; letter-spacing: -0.4px; margin-top: 2px; margin-bottom: 4px; }

/* NEXT banner */
.next-card {
  margin: 14px 16px 14px;
  background: var(--accent-bg);
  border: 0.5px solid var(--accent);
  border-radius: 16px;
  padding: 12px 14px;
  color: var(--accent-text);
}
.next-eyebrow { font-size: 12px; font-weight: 500; opacity: 0.85; }
.next-title { display: flex; align-items: center; gap: 8px; font-size: 17px; font-weight: 600; margin-top: 3px; }
.next-meta { font-size: 13px; opacity: 0.85; margin-top: 2px; padding-left: 28px; }
.next-title .icon { width: 20px; height: 20px; flex-shrink: 0; }

/* Cards */
.cards { padding: 0 16px 32px; display: flex; flex-direction: column; gap: 8px; }
.card {
  background: var(--card);
  border: 0.5px solid var(--card-border);
  border-radius: 16px;
  padding: 12px 14px;
  cursor: pointer;
  transition: background 0.12s;
}
.card:active { background: var(--separator); }
.card.is-expanded { padding-bottom: 16px; }
.card.is-tentatif {
  background: var(--tentatif-bg);
  border-color: var(--tentatif);
}
.card.is-past { opacity: 0.5; }

.card-row { display: flex; align-items: center; gap: 10px; }
.card-icon {
  width: 18px; height: 18px;
  flex-shrink: 0;
  color: var(--text-sec);
}
.card.is-tentatif .card-icon { color: var(--tentatif); }
.card-title {
  font-size: 15px; font-weight: 600; color: var(--text);
  display: inline-flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.card-meta {
  font-size: 13px; color: var(--text-sec);
  padding-left: 28px; margin-top: 2px;
}
.card-chips { padding-left: 28px; margin-top: 8px; }
.chip {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 12px; padding: 3px 10px;
  background: var(--separator);
  border-radius: 999px;
  color: var(--text-sec);
}
.chip .icon { width: 12px; height: 12px; }

.tentatif-badge {
  display: inline-block;
  font-size: 11px; font-weight: 500;
  padding: 2px 8px;
  background: var(--tentatif);
  color: white;
  border-radius: 999px;
}

.card-expand {
  margin-top: 14px; padding-top: 12px;
  border-top: 0.5px solid var(--separator);
  display: flex; flex-direction: column; gap: 14px;
}
.field-label { font-size: 12px; color: var(--text-sec); margin-bottom: 4px; font-weight: 500; }
.field-value { font-size: 14px; color: var(--text); line-height: 1.5; white-space: pre-wrap; }
.trajet-info { font-size: 14px; color: var(--text-sec); line-height: 1.4; }

.btn-maps {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px;
  background: var(--accent); color: white;
  border-radius: 999px;
  font-size: 13px; font-weight: 500;
  text-decoration: none;
  margin-top: 6px;
  border: none; cursor: pointer;
  -webkit-appearance: none;
}
.btn-maps .icon { width: 14px; height: 14px; }

.doc-pill {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px;
  padding: 7px 12px;
  background: var(--separator);
  border-radius: 10px;
  color: var(--text);
  text-decoration: none;
  margin-right: 6px; margin-top: 4px;
}
.doc-pill .icon { width: 14px; height: 14px; color: var(--text-sec); }

/* PDF Overlay viewer (utilisé partout, fix PWA iOS) */
.doc-overlay {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 400;
  display: flex; flex-direction: column;
  opacity: 0;
  transition: opacity 0.2s;
}
.doc-overlay.show { opacity: 1; }
.doc-overlay-bar {
  display: flex; align-items: center; gap: 8px;
  padding: env(safe-area-inset-top, 12px) 16px 10px;
  padding-top: max(env(safe-area-inset-top, 12px), 12px);
  background: var(--bg);
  border-bottom: 0.5px solid var(--separator);
}
.doc-overlay-close, .doc-overlay-extern {
  border: none; background: transparent; color: var(--accent);
  font-size: 15px; padding: 8px 10px; cursor: pointer;
  font-family: inherit; text-decoration: none;
  font-weight: 500;
  -webkit-appearance: none;
}
.doc-overlay-label {
  flex: 1; text-align: center; font-weight: 500;
  font-size: 14px; color: var(--text);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  padding: 0 6px;
}
.doc-overlay iframe, .doc-overlay embed, .doc-overlay object {
  flex: 1; border: none; width: 100%;
  background: white;
}

.contact-row { display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--text); }
.contact-row .icon { width: 13px; height: 13px; color: var(--text-sec); }
.contact-row a { color: var(--accent); text-decoration: none; }

/* Share buttons */
.card-share-icon {
  margin-left: auto;
  background: transparent;
  border: none;
  padding: 4px 0 4px 12px;
  color: var(--text-sec);
  cursor: pointer;
  font-family: inherit;
  -webkit-appearance: none;
  align-self: flex-start;
}
.card-share-icon:active { opacity: 0.5; }
.card-share-icon .icon { width: 18px; height: 18px; display: block; }

.doc-pill-wrap { display: inline-flex; align-items: stretch; margin-right: 6px; margin-top: 4px; }
.doc-pill-wrap .doc-pill {
  margin-right: 0; margin-top: 0;
  border-top-right-radius: 0; border-bottom-right-radius: 0;
}
.doc-share {
  background: var(--separator);
  border: none;
  border-left: 0.5px solid var(--card-border);
  border-top-right-radius: 10px;
  border-bottom-right-radius: 10px;
  padding: 0 10px;
  cursor: pointer;
  color: var(--text-sec);
  font-family: inherit;
  -webkit-appearance: none;
  display: flex; align-items: center; justify-content: center;
}
.doc-share:active { opacity: 0.6; }
.doc-share .icon { width: 13px; height: 13px; }

.icon { display: inline-block; vertical-align: middle; }
.icon svg { width: 100%; height: 100%; display: block; }

/* Context bands (avant/après les vacances) */
.context-band {
  margin: 8px 16px;
  padding: 10px 14px;
  background: var(--separator);
  border-radius: 12px;
  color: var(--text-sec);
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.context-band .icon { width: 14px; height: 14px; }
.context-band-label { font-weight: 500; color: var(--text); }

/* Search */
.search-fab {
  position: fixed;
  z-index: 60;
  background: var(--card);
  border: 0.5px solid var(--card-border);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--text);
  -webkit-appearance: none;
  font-family: inherit;
  right: 16px;
}
.search-fab:active { transform: scale(0.95); }
.search-fab .icon { display: block; }

/* Position unique sur toutes les vues : 30px, sous Sixtine du switcher prog */
.search-fab {
  width: 30px; height: 30px;
  top: calc(env(safe-area-inset-top, 0px) + 56px);
  right: 20px;
}
.search-fab .icon { width: 14px; height: 14px; }

.search-overlay {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 500;
  display: flex; flex-direction: column;
}
.search-header {
  display: flex; align-items: center;
  padding: max(env(safe-area-inset-top, 12px), 12px) 14px 10px;
  background: var(--bg);
  border-bottom: 0.5px solid var(--separator);
  gap: 10px;
}
.search-close {
  background: transparent; border: none;
  color: var(--accent);
  padding: 6px; cursor: pointer;
  font-family: inherit;
  -webkit-appearance: none;
}
.search-close .icon { width: 22px; height: 22px; display: block; }
.search-input {
  flex: 1;
  border: 0.5px solid var(--separator);
  background: var(--card);
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 16px;
  color: var(--text);
  font-family: inherit;
  -webkit-appearance: none;
  outline: none;
}
.search-input:focus { border-color: var(--accent); }
.search-results {
  flex: 1;
  overflow-y: auto;
  padding: 8px 14px env(safe-area-inset-bottom, 0px);
}
.search-result {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 4px;
  border-bottom: 0.5px solid var(--separator);
  cursor: pointer;
}
.search-result:active { background: var(--separator); }
.search-result .avatar { width: 32px; height: 32px; font-size: 12px; font-weight: 600; flex-shrink: 0; }
.search-result-info { flex: 1; min-width: 0; }
.search-result-title { font-size: 14px; font-weight: 500; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.search-result-meta { font-size: 12px; color: var(--text-sec); margin-top: 2px; }
.search-empty { padding: 40px 20px; text-align: center; color: var(--text-sec); }

/* Météo */
.weather-block { margin-top: 4px; }
.weather-label { font-size: 12px; color: var(--text-sec); font-weight: 500; margin-bottom: 8px; }
.weather-strip {
  display: flex; gap: 8px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  margin: 0 -14px;
  padding: 0 14px 4px;
  scrollbar-width: none;
}
.weather-strip::-webkit-scrollbar { display: none; }
.weather-cell {
  flex: 0 0 auto;
  display: flex; flex-direction: column; align-items: center;
  gap: 5px;
  padding: 10px 8px;
  background: var(--bg);
  border-radius: 12px;
  min-width: 52px;
}
.weather-day { font-size: 11px; color: var(--text-sec); font-weight: 500; }
.weather-icon { font-size: 22px; line-height: 1; }
.weather-temp { font-size: 14px; font-weight: 500; color: var(--text); }
.weather-hint { font-size: 12px; color: var(--text-ter); font-style: italic; }
.weather-loading { font-size: 12px; color: var(--text-sec); }

.empty-state { padding: 60px 24px; text-align: center; color: var(--text-sec); }
.edit-screen { padding: 40px 24px; text-align: center; color: var(--text-sec); }
.edit-screen h1 { font-size: 22px; color: var(--text); margin-bottom: 16px; }
.edit-screen a { color: var(--accent); text-decoration: none; }

/* Calendrier famille (home) */
.cal-eyebrow {
  padding: 0 20px;
  font-size: 13px;
  color: var(--text-sec);
  margin-bottom: 8px;
}
.cal-wrap { padding: 0 16px 32px; }
.cal-month {
  background: var(--card);
  border: 0.5px solid var(--card-border);
  border-radius: 16px;
  padding: 14px;
  margin-bottom: 12px;
}
.cal-month-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 10px;
  text-transform: capitalize;
  color: var(--text);
}
.cal-dow {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  font-size: 11px;
  color: var(--text-sec);
  text-align: center;
  margin-bottom: 6px;
  font-weight: 500;
}
.cal-days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}
.cal-day {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  border-radius: 8px;
  cursor: pointer;
  color: var(--text);
  background: transparent;
  border: none;
  font-family: inherit;
  padding: 0;
  -webkit-appearance: none;
  transition: background 0.12s;
}
.cal-day:active { background: var(--separator); }
.cal-day.is-out { color: var(--text-ter); cursor: default; pointer-events: none; }
.cal-day.is-today { background: var(--accent); color: white; font-weight: 600; }
.cal-day.has-event::after {
  content: "";
  position: absolute;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--accent);
  margin-top: 20px;
}
.cal-day { position: relative; }

/* Day sheet (bottom modal) */
.sheet-backdrop {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.4);
  z-index: 100;
  opacity: 0;
  transition: opacity 0.25s;
}
.sheet-backdrop.show { opacity: 1; }
.sheet {
  position: fixed; left: 0; right: 0; bottom: 0;
  background: var(--card);
  border-top-left-radius: 24px;
  border-top-right-radius: 24px;
  padding: 12px 20px calc(env(safe-area-inset-bottom, 0px) + 20px);
  transform: translateY(100%);
  transition: transform 0.25s ease-out;
  z-index: 101;
  max-height: 85vh;
  overflow-y: auto;
  max-width: 480px;
  margin: 0 auto;
}
.sheet.show { transform: translateY(0); }
.sheet-grip {
  width: 36px; height: 4px;
  background: var(--text-ter);
  border-radius: 2px;
  margin: 4px auto 14px;
}
.sheet-title {
  font-size: 18px; font-weight: 600;
  text-align: center;
  margin-bottom: 16px;
  text-transform: capitalize;
  color: var(--text);
}
.sheet-row {
  display: flex; align-items: center;
  gap: 14px;
  padding: 10px 4px;
  border-top: 0.5px solid var(--separator);
  cursor: pointer;
  border-radius: 8px;
  margin: 0 -4px;
  transition: background 0.12s;
}
.sheet-row:first-of-type { border-top: 0; }
.sheet-row:active { background: var(--separator); }
.sheet-row-chev {
  color: var(--text-ter);
  margin-left: auto;
  font-size: 18px;
}
.sheet-row .avatar { width: 32px; height: 32px; font-size: 12px; font-weight: 600; flex-shrink: 0; }
.sheet-row-name { font-weight: 500; color: var(--text); min-width: 62px; font-size: 14px; }
.sheet-row-act { color: var(--text-sec); font-size: 14px; flex: 1; }
.sheet-close {
  display: block; width: 100%;
  margin-top: 16px;
  padding: 13px;
  background: var(--separator);
  border: none; border-radius: 12px;
  font-size: 16px; font-weight: 500;
  color: var(--text); cursor: pointer;
  font-family: inherit;
  -webkit-appearance: none;
}

/* Edit mode : desktop-only */
body.edit-mode .app { max-width: 100%; }
.edit-header {
  position: sticky; top: 0; z-index: 50;
  background: var(--bg);
  padding: 12px 16px;
  border-bottom: 0.5px solid var(--separator);
  display: flex; align-items: center; gap: 12px;
}
.edit-title { font-size: 17px; font-weight: 600; flex: 1; color: var(--text); }
.edit-back {
  display: inline-flex; align-items: center; gap: 2px;
  color: var(--accent);
  font-size: 16px; padding: 6px 10px 6px 0;
  text-decoration: none; cursor: pointer;
  border: none; background: transparent;
  font-family: inherit;
}
.edit-back .icon { width: 22px; height: 22px; }
.save-btn {
  background: var(--accent); color: white;
  border: none; border-radius: 999px;
  padding: 9px 18px;
  font-size: 14px; font-weight: 500;
  cursor: pointer; font-family: inherit;
  -webkit-appearance: none;
  position: relative;
  transition: background 0.15s;
}
.save-btn.is-dirty { background: var(--tentatif); }
.save-btn.is-dirty::after {
  content: ""; position: absolute;
  top: 6px; right: 6px;
  width: 8px; height: 8px;
  background: white; border-radius: 50%;
}
.tool-btn {
  background: transparent;
  border: 0.5px solid var(--separator);
  color: var(--text);
  border-radius: 999px;
  padding: 7px 14px;
  font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: inherit;
  -webkit-appearance: none;
}
.tool-btn:hover { background: var(--separator); }
.edit-grid td.col-date.is-clickable { cursor: pointer; transition: background 0.12s; }
.edit-grid td.col-date.is-clickable:hover { background: var(--accent-bg); color: var(--accent); }

/* Section enrichissements */
.enrich-section { padding: 24px 16px 80px; }
.enrich-title { font-size: 17px; font-weight: 600; margin-bottom: 4px; color: var(--text); }
.enrich-sub { font-size: 13px; color: var(--text-sec); margin-bottom: 16px; }
.enrich-list { display: flex; flex-direction: column; gap: 6px; }
.enrich-row {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 14px;
  background: var(--card);
  border: 0.5px solid var(--card-border);
  border-radius: 12px;
  cursor: pointer;
  transition: background 0.12s;
}
.enrich-row:hover { background: var(--accent-bg); }
.enrich-row-titre { font-weight: 500; color: var(--text); font-size: 14px; flex: 1; }
.enrich-row-dates { font-size: 12px; color: var(--text-sec); }
.enrich-badge {
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 999px;
  font-weight: 500;
}
.enrich-badge.done { background: rgba(45, 158, 117, 0.16); color: rgb(15, 110, 86); }
.enrich-badge.todo { background: var(--separator); color: var(--text-sec); }
@media (prefers-color-scheme: dark) {
  .enrich-badge.done { background: rgba(45, 158, 117, 0.24); color: rgb(157, 226, 199); }
}

.modal.is-large { max-width: 540px; max-height: 85vh; overflow-y: auto; }
.doc-pill-edit {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 12px;
  background: var(--bg);
  border: 0.5px solid var(--separator);
  border-radius: 10px;
  margin-bottom: 6px;
}
.doc-pill-edit input {
  flex: 1; border: none; background: transparent; padding: 4px 0;
  font-size: 13px; color: var(--text); font-family: inherit;
  outline: none; min-width: 0;
}
.doc-pill-edit .doc-remove {
  background: transparent; border: none;
  color: var(--text-sec); cursor: pointer;
  font-size: 18px; padding: 0 4px; line-height: 1;
  font-family: inherit;
}
.doc-add-btn {
  background: transparent;
  border: 0.5px dashed var(--separator);
  color: var(--accent);
  border-radius: 10px; padding: 8px 12px;
  cursor: pointer; font-family: inherit;
  font-size: 13px;
  -webkit-appearance: none;
  margin-top: 4px;
  width: 100%;
}

.edit-grid-wrap { overflow-x: auto; padding-bottom: 60px; }
.edit-grid {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  background: var(--card);
}
.edit-grid th, .edit-grid td {
  border: 0.5px solid var(--separator);
  padding: 8px 10px;
  text-align: left;
  vertical-align: middle;
  white-space: nowrap;
}
.edit-grid th {
  background: var(--bg);
  font-size: 11px;
  font-weight: 600;
  color: var(--text-sec);
  position: sticky; top: 57px;
  z-index: 10;
}
.edit-grid .col-date { width: 80px; color: var(--text-sec); font-variant-numeric: tabular-nums; }
.edit-grid .col-dow { width: 36px; color: var(--text-sec); text-align: center; }
.edit-grid .cell {
  cursor: pointer;
  user-select: none;
  transition: background 0.12s;
  min-width: 120px;
}
.edit-grid .cell:hover { background: var(--accent-bg); }
.edit-grid .cell.is-routine { color: var(--text-ter); }
.edit-grid .cell.is-trajet { color: var(--accent); }
.edit-grid .cell.has-note { position: relative; padding-right: 22px; }
.edit-grid .cell.has-note::after {
  content: ""; position: absolute;
  right: 8px; top: 50%; transform: translateY(-50%);
  width: 6px; height: 6px;
  background: var(--accent); border-radius: 50%;
}
.edit-grid .cell.is-empty { color: var(--text-ter); font-style: italic; }
.edit-grid tr.is-weekend { background: rgba(127,127,127,0.04); }

/* Modal */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.45);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0;
  transition: opacity 0.2s;
}
.modal-backdrop.show { opacity: 1; }
.modal {
  background: var(--card);
  border-radius: 16px;
  padding: 22px;
  max-width: 440px; width: 100%;
  transform: scale(0.96);
  transition: transform 0.2s;
}
.modal-backdrop.show .modal { transform: scale(1); }
.modal-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; color: var(--text); }
.modal-sub { font-size: 13px; color: var(--text-sec); margin-bottom: 16px; }
.modal-field { margin-bottom: 14px; }
.modal-field label {
  display: block;
  font-size: 12px; color: var(--text-sec);
  font-weight: 500;
  margin-bottom: 5px;
}
.modal-field input, .modal-field textarea {
  width: 100%;
  padding: 10px 12px;
  border: 0.5px solid var(--separator);
  border-radius: 10px;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  box-sizing: border-box;
  -webkit-appearance: none;
}
.modal-field input:focus, .modal-field textarea:focus {
  outline: none;
  border-color: var(--accent);
}
.modal-field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
.modal-actions {
  display: flex; gap: 10px;
  justify-content: flex-end;
  margin-top: 18px;
}
.modal-btn {
  padding: 9px 18px;
  border-radius: 999px;
  font-size: 14px; font-weight: 500;
  cursor: pointer; font-family: inherit;
  -webkit-appearance: none;
  border: none;
}
.modal-btn-cancel { background: var(--separator); color: var(--text); }
.modal-btn-save { background: var(--accent); color: white; }

/* Toast */
.toast {
  position: fixed; left: 50%; transform: translateX(-50%);
  bottom: 32px;
  background: rgba(0,0,0,0.88);
  color: white;
  padding: 11px 20px;
  border-radius: 999px;
  font-size: 14px;
  z-index: 300;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
  max-width: 90vw;
  text-align: center;
}
.toast.show { opacity: 1; }
.toast.error { background: rgba(207, 48, 48, 0.95); }

/* ============================================================
   PRINT VIEW (?print=1) — calendrier 3 pages pour grands-parents
   ============================================================ */
.print-link-wrap {
  text-align: center;
  padding: 24px 16px 32px;
}
.print-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  color: var(--text-sec);
  text-decoration: none;
  padding: 10px 18px;
  border: 0.5px solid var(--separator);
  border-radius: 999px;
  background: var(--card);
}
.print-link .icon { width: 16px; height: 16px; }

body.print-mode {
  background: #6b6b71;
}
body.print-mode .app { max-width: none; }

.print-toolbar {
  position: sticky; top: 0; z-index: 50;
  background: var(--bg);
  padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 0.5px solid var(--separator);
}
.print-toolbar-title {
  font-size: 14px; font-weight: 500;
  flex: 1; text-align: center;
  color: var(--text);
}
.print-go-btn {
  background: var(--accent); color: white;
  border: none;
  padding: 9px 18px;
  border-radius: 999px;
  font-size: 14px; font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  -webkit-appearance: none;
  display: inline-flex; align-items: center; gap: 6px;
}
.print-go-btn .icon { width: 14px; height: 14px; }

.print-hint {
  max-width: 210mm;
  margin: 12px auto 0;
  padding: 10px 14px;
  background: var(--accent-bg);
  color: var(--accent-text);
  border-radius: 10px;
  font-size: 13px;
  line-height: 1.4;
}

.print-page {
  /* A4 portrait : 210 × 297 mm */
  width: 210mm;
  min-height: 297mm;
  background: white;
  color: #000;
  margin: 20px auto;
  padding: 14mm 12mm 10mm;
  box-shadow: 0 4px 20px rgba(0,0,0,0.35);
  font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
  page-break-after: always;
  display: flex;
  flex-direction: column;
}
.print-page:last-of-type { page-break-after: auto; }

.p-header {
  text-align: center;
  margin-bottom: 5mm;
  flex-shrink: 0;
}
.p-eyebrow {
  font-size: 10pt;
  color: #666;
  letter-spacing: 0.3pt;
}
.p-title {
  font-size: 26pt;
  font-weight: 700;
  margin-top: 1mm;
  letter-spacing: -0.5pt;
  color: #111;
}

.p-table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
  flex: 1;
}
.p-table thead { display: table-header-group; }
.p-th {
  border: 0.4pt solid #999;
  padding: 4pt 2pt;
  background: #ececef;
  font-weight: 600;
  font-size: 9pt;
  text-align: center;
  vertical-align: middle;
  -webkit-print-color-adjust: exact !important;
  print-color-adjust: exact !important;
}
.p-th-date { width: 18mm; }
.p-th-user {
  padding: 3pt 2pt;
}
.p-th-name {
  font-size: 9pt;
  font-weight: 600;
  margin-top: 2pt;
}
.p-avatar {
  width: 22pt; height: 22pt;
  border-radius: 50%;
  display: block;
  margin: 0 auto 1pt;
  object-fit: cover;
}
.p-avatar-fallback {
  width: 22pt; height: 22pt;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 1pt;
  font-size: 9pt; font-weight: 700;
  -webkit-print-color-adjust: exact !important;
  print-color-adjust: exact !important;
}

.p-row {
  height: 7.6mm;  /* hauteur fixe pour consistency entre jours */
  -webkit-print-color-adjust: exact !important;
  print-color-adjust: exact !important;
}
.p-row.is-weekend .p-date-cell {
  background: #e8edf3;
}

.p-cell {
  border: 0.4pt solid #c8c8cc;
  padding: 0;
  vertical-align: middle;
  text-align: center;
  line-height: 1.1;
  -webkit-print-color-adjust: exact !important;
  print-color-adjust: exact !important;
  overflow: hidden;
  height: 7.6mm;
}
.p-cell-inner {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100%;
  padding: 1pt 2pt;
  overflow: hidden;
  gap: 0.5pt;
}
.p-date-cell {
  background: #f5f5f7;
  text-align: center;
}
.p-date-cell .p-cell-inner { flex-direction: row; gap: 4pt; }
.p-dow {
  font-size: 7.5pt;
  color: #777;
  text-transform: uppercase;
  letter-spacing: 0.3pt;
}
.p-day {
  font-weight: 700;
  font-size: 10.5pt;
  color: #111;
}

.p-routine {
  color: #999;
  font-style: italic;
  font-size: 7.8pt;
}

.p-sejour { font-size: 8pt; }
.p-sejour-title {
  font-weight: 700;
  font-size: 8pt;
  line-height: 1.05;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.p-sejour-sub {
  font-size: 6.5pt;
  font-weight: 400;
  opacity: 0.85;
  line-height: 1.05;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
/* Couleur par GROUPE D'ACTIVITÉ — bande horizontale uniforme quand la
   famille est ensemble au même endroit. Pastels assez doux pour rester
   lisibles à l'impression couleur ET en N&B (différence de luminosité). */
.p-sejour.g-atlantique { background: #cfdef5; color: #0a3a72; }
.p-sejour.g-med        { background: #fcdfbf; color: #7d3e08; }
.p-sejour.g-montagne   { background: #d5ebc4; color: #2a4f12; }
.p-sejour.g-etranger   { background: #e2ddf6; color: #2f2868; }
.p-sejour.g-evenement  { background: #e6e6ea; color: #424247; }

/* Gonfaron : même orange que le groupe Méditerranée, mais avec des hachures
   diagonales +45° (sens INVERSE de "tentatif" qui est en -45°), pour le
   distinguer de Villedieu sans changer son appartenance au groupe. */
.p-sejour.is-gonfaron {
  background-image: repeating-linear-gradient(
    45deg,
    rgba(125, 62, 8, 0.13) 0,
    rgba(125, 62, 8, 0.13) 1.2pt,
    transparent 1.2pt,
    transparent 4.5pt
  );
}

.p-sejour.is-tentatif {
  background-image: repeating-linear-gradient(
    -45deg,
    rgba(0,0,0,0.04) 0,
    rgba(0,0,0,0.04) 2pt,
    transparent 2pt,
    transparent 5pt
  );
  border: 0.5pt dashed #888;
}

.p-trajet {
  background: #eaf3ff;
  color: #053673;
}
.p-trajet-route {
  font-weight: 700;
  font-size: 7.8pt;
  line-height: 1.05;
}
.p-trajet-time {
  font-size: 6.8pt;
  font-weight: 600;
  color: #1f5390;
  line-height: 1.05;
}

.p-empty { background: white; }

.p-footer {
  text-align: center;
  font-size: 8.5pt;
  color: #888;
  margin-top: 3mm;
  flex-shrink: 0;
}
.p-footer-url-line {
  margin-top: 1.5mm;
  font-size: 7.5pt;
}
.p-footer-url {
  font-weight: 600;
  color: #555;
  letter-spacing: 0.2pt;
}
.p-footer-legend {
  font-size: 7.2pt;
  display: flex;
  justify-content: center;
  gap: 10pt;
  flex-wrap: wrap;
  color: #555;
}
.p-legend-item {
  display: inline-flex;
  align-items: center;
  gap: 3pt;
  white-space: nowrap;
}
.p-legend-sw {
  display: inline-block;
  width: 9pt; height: 9pt;
  border-radius: 2pt;
  -webkit-print-color-adjust: exact !important;
  print-color-adjust: exact !important;
}
.p-legend-sw.g-atlantique { background: #cfdef5; }
.p-legend-sw.g-med        { background: #fcdfbf; }
.p-legend-sw.g-montagne   { background: #d5ebc4; }
.p-legend-sw.g-etranger   { background: #e2ddf6; }
.p-legend-sw.g-evenement  { background: #e6e6ea; }
.p-legend-sw.is-tentatif-sw {
  background: white;
  border: 0.5pt dashed #888;
}

@media print {
  body.print-mode { background: white; }
  .print-toolbar, .print-hint, .search-fab { display: none !important; }
  /* @page margin: 0 — la .print-page possède 100% de la page A4 et gère
     elle-même ses propres padding. Évite les conflits @page vs Safari iOS. */
  @page {
    size: A4 portrait;
    margin: 0;
  }
  html, body {
    margin: 0 !important;
    padding: 0 !important;
    background: white !important;
  }
  /* Verrouille chaque page à EXACTEMENT 210×297mm (A4 portrait) avec
     box-sizing border-box. iOS Safari respecte ce dimensionnement et
     met UNE .print-page par feuille physique. */
  .print-page {
    width: 210mm;
    height: 297mm;
    max-height: 297mm;
    padding: 6mm 7mm 4mm;
    box-sizing: border-box;
    margin: 0;
    box-shadow: none;
    overflow: hidden;
    page-break-after: always;
    page-break-inside: avoid;
    break-after: page;
    break-inside: avoid;
  }
  .print-page:last-of-type {
    page-break-after: auto;
    break-after: auto;
  }
  /* Juillet = 31 jours : doit absolument tenir. Réduit la hauteur ligne
     et le header pour print, garde la lisibilité écran intacte. */
  .p-header { margin-bottom: 2mm; }
  .p-eyebrow { font-size: 9pt; }
  .p-title { font-size: 20pt; margin-top: 0; }
  .p-row, .p-row > .p-cell { height: 7.1mm; }
  .p-th { padding: 2pt 1pt; }
  .p-avatar, .p-avatar-fallback { width: 18pt; height: 18pt; }
  .p-th-name { font-size: 8pt; }
  .p-footer { margin-top: 1.5mm; font-size: 7pt; }
  .p-footer-url-line { margin-top: 0.8mm; font-size: 7pt; }
  .p-footer-legend { gap: 8pt; font-size: 6.6pt; }
}
</style>

function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"})[c]); }

function el(tag, props, ...kids) {
  const e = document.createElement(tag);
  if (props) for (const [k, v] of Object.entries(props)) {
    if (v == null) continue;
    if (k === "class") e.className = v;
    else if (k === "style" && typeof v === "object") Object.assign(e.style, v);
    else if (k === "html") e.innerHTML = v;
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k in e && typeof v !== "boolean") e[k] = v;
    else e.setAttribute(k, v);
  }
  for (const k of kids) {
    if (k == null || k === false) continue;
    e.appendChild(typeof k === "string" ? document.createTextNode(k) : k);
  }
  return e;
}

function iconSpan(name, extraClass) {
  return el("span", { class: "icon" + (extraClass ? " " + extraClass : ""), html: ICONS[name] || "" });

function parseDate(iso) { const [y,m,d] = iso.split("-").map(Number); return new Date(y, m-1, d); }
const MONTHS_LONG = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
const MONTHS_SHORT = ["janv.","févr.","mars","avr.","mai","juin","juil.","août","sept.","oct.","nov.","déc."];
function fmtDateRange(s, e) {
  const ds = parseDate(s), de = parseDate(e);
  if (ds.getMonth() === de.getMonth()) return `${ds.getDate()} → ${de.getDate()} ${MONTHS_LONG[ds.getMonth()]}`;
  return `${ds.getDate()} ${MONTHS_SHORT[ds.getMonth()]} → ${de.getDate()} ${MONTHS_SHORT[de.getMonth()]}`;
}
function fmtDateSingle(iso) { const d = parseDate(iso); return `${d.getDate()} ${MONTHS_LONG[d.getMonth()]}`; }
function daysBetween(d1, d2) { return Math.round((d2 - d1) / (1000*60*60*24)); }
function nightsFromRange(s, e) { return Math.max(1, daysBetween(parseDate(s), parseDate(e))); }
function shiftDate(iso, days) {
  const d = parseDate(iso); d.setDate(d.getDate() + days);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function userById(id) { return DATA.users.find(u => u.id === id); }

function avatarEl(u, extraClass) {

  if (u.photo) return el("div", { class: cls }, el("img", { src: u.photo, alt: u.nom }));
  return el("div", { class: cls }, u.initials || u.nom[0]);
}

// === Computation : sejours/trajets dérivés de DATA.d + DATA.c (grille-first) =======
const YEAR_DEFAULT = 2026;
const USER_COL_IDX = { anatole: 2, auguste: 3, sixtine: 4, carole: 5, jal: 6 };
const ROUTINE_ACTS = new Set([
  "WeekEnd Dubai","Boulot Dubai","Ecole Dubai","Dubai",
  "Dubai - Off","Stage ou Petit Boulot","School Start"
]);
// Préfixes qui marquent une routine (ex. "Boulot Dubai JAL", "WeekEnd Dubai Carole")
const ROUTINE_PREFIXES = ["boulot dubai","weekend dubai","ecole dubai","dubai - off"];
function isRoutine(act) {
  if (!act) return true;
  if (ROUTINE_ACTS.has(act)) return true;
  const lower = act.trim().toLowerCase();
  for (const p of ROUTINE_PREFIXES) {
    if (lower === p || lower.startsWith(p + " ")) return true;
  }
  return false;
}
function isTrajet(act) {
  if (!act) return false;
  if (/^(Flight|Vol|Fly|Train|TGV|TER|Trajet)\b/i.test(act)) return true;
  if (/^[A-Za-zÀ-ÿ]+(?:-[A-Za-zÀ-ÿ]+)+$/.test(act)) return true;
  return false;
}
function isTentatif(act) { return !!(act && act.trim().endsWith("?")); }
function cleanTitre(act) { return act.replace(/\s*\?+\s*$/, '').trim(); }
function visualTitre(act) {
  let s = act.trim()
    .replace(/^Flight\s+/i, 'Vol ')
    .replace(/^Trajet\s+/i, '');  // "Trajet X-Y" → "X-Y" (puis split sur tirets)
  // Hyphenated route: insert " → "
  if (/[A-Za-zÀ-ÿ]+(?:-[A-Za-zÀ-ÿ]+)+/.test(s)) {
    const parts = s.split(/\s+/);
    const idx = parts.findIndex(p => /[A-Za-zÀ-ÿ]+-[A-Za-zÀ-ÿ]+/.test(p));
    if (idx >= 0) parts[idx] = parts[idx].replace(/-/g, ' → ');
    return parts.join(' ');
  }
  return s;
}

const RE_REF = /Booking reference:\s*([A-Z0-9]+)/i;
const RE_FNUM = /\b([A-Z]{1,3})\s*(\d{3,5})\s+(?:Sun|Mon|Tue|Wed|Thu|Fri|Sat)\b/;
const RE_COMP = /\b(Emirates|Air France|Aer Lingus|Volotea|Ryanair|TGV Inoui|TGV|SNCF)\b/i;
const RE_DEP1 = /Flight departure time:\s*([0-9]{1,2}[:h;][0-9]{2})/i;
const RE_DEP2 = /Departure\s*\([^)]+\):\s*([0-9]{1,2}[:h;][0-9]{2})/i;
const RE_ARR1 = /Flight arrival date time:\s*([0-9]{1,2}[:h;][0-9]{2})/i;
const RE_ARR2 = /Arrival\s*\([^)]+\):\s*([0-9]{1,2}[:h;][0-9]{2})/i;
const RE_ORIG = /Origin:\s*([^\n(]+)\s*\(([A-Z]{3})\)/;
const RE_DEST = /Destination:\s*([^\n(]+)\s*\(([A-Z]{3})\)/;
const RE_COST = /Cost:\s*([A-Z]{2,4}\s*[0-9,]+(?:\.\d+)?)/i;
function parseTrajetNote(note) {
  if (!note) return {};
  const out = {}; let m;
  if (m = RE_REF.exec(note)) out.reference = m[1];
  if (m = RE_FNUM.exec(note)) out.vol = m[1] + " " + m[2];
  if (m = RE_COMP.exec(note)) out.compagnie = m[1];
  if ((m = RE_DEP1.exec(note)) || (m = RE_DEP2.exec(note))) out.heureDepart = m[1].replace(/[h;]/, ':');
  if ((m = RE_ARR1.exec(note)) || (m = RE_ARR2.exec(note))) out.heureArrivee = m[1].replace(/[h;]/, ':');
  if (m = RE_ORIG.exec(note)) out.origine = m[1].trim() + " (" + m[2] + ")";
  if (m = RE_DEST.exec(note)) out.destination = m[1].trim() + " (" + m[2] + ")";
  if (m = RE_COST.exec(note)) out.cost = m[1].trim();
  // Note nettoyée : on retire UNIQUEMENT les champs déjà extraits pour le leg PRINCIPAL.
  // Si la note contient des infos d'un 2e leg (train de raccord par ex.), on les garde.
  // Heuristique : si "Flight departure time:" est présent, le leg principal est le vol
  // → on garde "Departure (X):" et "Arrival (X):" car ils appartiennent au 2e leg.
  // Sinon (train-only par ex.), on strip aussi ces patterns car ils ont déjà été extraits.
  const hasFlightDep = /Flight departure time:/i.test(note);
  let cleaned = note
    .replace(/^.*Booking reference:.*$/gim, '')                                          // ligne entière
    .replace(/^.*[A-Z]{1,3}\s*\d{3,5}\s+(?:Sun|Mon|Tue|Wed|Thu|Fri|Sat).*$/gim, '')      // ligne vol + jour
    .replace(/^.*Flight departure time:.*$/gim, '')
    .replace(/^.*Flight arrival date time:.*$/gim, '')
    .replace(/^\s*Origin:.*$/gim, '')
    .replace(/^\s*Destination:.*$/gim, '');
  if (!hasFlightDep) {
    cleaned = cleaned
      .replace(/^.*Departure\s*\([^)]+\):.*$/gim, '')
      .replace(/^.*Arrival\s*\([^)]+\):.*$/gim, '');
  }
  cleaned = cleaned
    .replace(/^\s*Cost:.*$/m, '')   // 1ère ligne Cost seulement (le 2e leg garde son Cost)
    .replace(/^\s*Reference #:\s*$/gim, '')  // strip "Reference #:" sans valeur
    .replace(/^\s*Ticket #:\s*$/gim, '')     // strip "Ticket #:" sans valeur
    .replace(/\n\s*\n\s*\n+/g, '\n\n')
    .trim();
  out.cleanNote = cleaned;
  return out;
}
function trajetType(act, info) {
  if (/^(Flight|Vol|Fly)\b/i.test(act)) return "vol";
  if (info.compagnie && /Emirates|Air France|Aer Lingus|Volotea|Ryanair/i.test(info.compagnie)) return "vol";
  if (/^(Train|TGV|TER)\b/i.test(act)) return "train";
  if (info.compagnie && /TGV/i.test(info.compagnie)) return "train";
  return "transfert";
}

function computeStretches(userId) {
  const colIdx = USER_COL_IDX[userId];
  if (colIdx == null) return [];
  const out = []; let cur = null;
  for (const row of DATA.d) {
    const date = `${YEAR_DEFAULT}-${row[0]}`;
    const act = row[colIdx];
    if (isRoutine(act) || isTrajet(act)) {
      if (cur) { out.push(cur); cur = null; }
      continue;
    }
    const clean = cleanTitre(act); const tentatif = isTentatif(act);
    if (cur && cur.clean === clean && cur.tentatif === tentatif) {
      cur.end = date; cur.days++;
    } else {
      if (cur) out.push(cur);
      cur = { start: date, end: date, clean, tentatif, days: 1 };
    }
  }
  if (cur) out.push(cur);
  return out;
}

function findSejourOthers(titre, dateStart, dateEnd, viewerId) {
  // Chevauchement : un autre user est "co-présent" si un de ses stretches au même
  // titre chevauche la fenêtre du viewer (même partiellement).
  const others = [];
  for (const u of DATA.users) {
    if (u.id === viewerId) continue;
    if (computeStretches(u.id).some(s =>
      s.clean === titre && s.start <= dateEnd && s.end >= dateStart
    )) {
      others.push(u.id);
    }
  }
  return others;
}

function computeItems(userId) {
  const items = [];
  // Séjours pour ce user
  for (const s of computeStretches(userId)) {
    const others = findSejourOthers(s.clean, s.start, s.end, userId);
    const enrich = (DATA.enrichissements || {})[s.clean] || {};
    items.push({
      kind: "sejour",
      date: s.start, dateEnd: s.end,
      obj: {
        titre: s.clean,
        dateStart: s.start, dateEnd: s.end,
        tentatif: s.tentatif,
        participants: [userId, ...others],
        adresse: enrich.adresse || "",
        gmapsUrl: enrich.gmapsUrl || "",
        contact: enrich.contact || "",
        notes: enrich.notes || "",
        docs: enrich.docs || []
      }
    });
  }
  // Trajets pour ce user
  const colIdx = USER_COL_IDX[userId];
  for (const row of DATA.d) {
    const date = `${YEAR_DEFAULT}-${row[0]}`;
    const act = row[colIdx];
    if (!isTrajet(act)) continue;
    const note = (DATA.c || {})[`${date}|${userId}`] || "";
    const info = parseTrajetNote(note);
    // Co-voyageurs : même date + même numéro de vol (ex. EK 089), ou fallback
    // même activité texte si aucun n'a de numéro de vol (cas des trajets non-aériens).
    const others = [];
    for (const u of DATA.users) {
      if (u.id === userId) continue;
      const u_act = row[USER_COL_IDX[u.id]];
      if (!isTrajet(u_act)) continue;
      const u_info = parseTrajetNote((DATA.c || {})[`${date}|${u.id}`] || "");
      if (info.vol && u_info.vol) {
        if (info.vol === u_info.vol) others.push(u.id);
      } else if (!info.vol && !u_info.vol && u_act === act) {
        others.push(u.id);
      }
    }
    // Docs : merge ceux de tous les co-voyageurs (dédup par URL)
    const mergedDocs = []; const seenUrls = new Set();
    for (const p of [userId, ...others]) {
      const pDocs = (DATA.docs_trajets || {})[`${date}|${p}`] || [];
      for (const d of pDocs) {
        if (d.url && !seenUrls.has(d.url)) { seenUrls.add(d.url); mergedDocs.push(d); }
      }
    }
    items.push({
      kind: "trajet",
      date, dateEnd: date,
      obj: {
        titre: visualTitre(act),
        type: trajetType(act, info),
        date,
        heureDepart: info.heureDepart || "",
        heureArrivee: info.heureArrivee || "",
        origine: info.origine || "",
        destination: info.destination || "",
        compagnie: info.compagnie || "",
        vol: info.vol || "",
        reference: info.reference || "",
        cost: info.cost || "",
        notes: note,
        participants: [userId, ...others],
        docs: mergedDocs
      }
    });
  }
  items.sort((a, b) => a.date.localeCompare(b.date) || (a.kind === "trajet" ? -1 : 1));

  // Bridges "À Dubai / Boulot Dubai" : entre 2 events, si que des routines Dubai
  // pendant ≥ 2 jours, crée un séjour intermédiaire avec le titre dominant.
  if (colIdx != null && items.length >= 2) {
    const bridges = [];
    for (let i = 0; i < items.length - 1; i++) {
      const aEndIso = items[i].dateEnd, bStartIso = items[i + 1].date;
      const aEnd = parseDate(aEndIso), bStart = parseDate(bStartIso);
      const gap = daysBetween(aEnd, bStart) - 1;
      if (gap < 2) continue;  // au moins 2 jours pour mériter un pill
      const gapStartIso = shiftDate(aEndIso, 1);
      const gapEndIso = shiftDate(bStartIso, -1);
      const counts = {}; let allRoutine = true;
      for (const row of DATA.d) {
        const dateIso = `${YEAR_DEFAULT}-${row[0]}`;
        if (dateIso < gapStartIso || dateIso > gapEndIso) continue;
        const act = row[colIdx];
        if (!isRoutine(act)) { allRoutine = false; break; }
        counts[act] = (counts[act] || 0) + 1;
      }
      if (!allRoutine) continue;
      // Titre = activité la plus fréquente, fallback "À Dubai"
      let titre = "À Dubai";
      const sorted = Object.entries(counts).sort((x, y) => y[1] - x[1]);
      if (sorted.length > 0) titre = sorted[0][0];
      // Pull enrichments by titre (ex. "Boulot Dubai" → adresse/maps/contact/notes)
      const bridgeEnrich = ((DATA.enrichissements || {})[titre]) || {};
      bridges.push({
        kind: "sejour",
        date: gapStartIso, dateEnd: gapEndIso,
        obj: {
          titre, dateStart: gapStartIso, dateEnd: gapEndIso,
          tentatif: false, participants: [userId],
          adresse: bridgeEnrich.adresse || "",
          gmapsUrl: bridgeEnrich.gmapsUrl || "",
          contact: bridgeEnrich.contact || "",
          notes: bridgeEnrich.notes || "",
          docs: bridgeEnrich.docs || []
        }
      });
    }
    items.push(...bridges);
    items.sort((a, b) => a.date.localeCompare(b.date) || (a.kind === "trajet" ? -1 : 1));
  }

  return items;
}

function chipText(participants, viewerId) {
  const others = participants.filter(p => p !== viewerId);
  if (others.length === 0) return null;
  if (others.length === DATA.users.length - 1) return "Famille au complet";
  const noms = others.map(p => userById(p)?.nom).filter(Boolean);
  if (noms.length === 1) return `avec ${noms[0]}`;
  if (noms.length === 2) return `avec ${noms[0]} et ${noms[1]}`;
  return `avec ${noms.slice(0,-1).join(", ")} et ${noms[noms.length-1]}`;
}

};
const DOW_ABBR_FR = ["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];

function lsCacheGet(key, ttlMs) {
  try {
    const raw = localStorage.getItem(key); if (!raw) return null;
    const { ts, data } = JSON.parse(raw);
    if (Date.now() - ts > ttlMs) return null;
    return data;
  } catch (e) { return null; }
}
function lsCacheSet(key, data) {
  try { localStorage.setItem(key, JSON.stringify({ ts: Date.now(), data })); } catch (e) {}
}

async function geocode(query) {
  if (!query) return null;
  const k = "geo_" + query.toLowerCase().trim();
  const cached = lsCacheGet(k, 30*24*3600*1000);  // 30 days
  if (cached) return cached;
  try {
    const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=1&language=fr&format=json`;
    const r = await fetch(url);
    if (!r.ok) return null;
    const j = await r.json();
    if (!j.results || !j.results.length) return null;
    const res = j.results[0];
    const data = { lat: res.latitude, lng: res.longitude, name: res.name, country: res.country };
    lsCacheSet(k, data);
    return data;
  } catch (e) { return null; }
}

async function fetchForecast(lat, lng, startIso, endIso) {
  const k = `wx_${lat.toFixed(2)}_${lng.toFixed(2)}_${startIso}_${endIso}`;
  const cached = lsCacheGet(k, 3*3600*1000);  // 3 hours
  if (cached) return cached;
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&start_date=${startIso}&end_date=${endIso}`;
    const r = await fetch(url);
    if (!r.ok) return null;
    const j = await r.json();
    if (!j.daily || !j.daily.time) return null;
    lsCacheSet(k, j.daily);
    return j.daily;
  } catch (e) { return null; }
}

// Surcharges manuelles pour les lieux dont le nom du séjour ne géocode pas direct
// Format : valeur = "string" (= query simple) ou { query, display }
const LOCATION_OVERRIDES = {
  "Chantier Jeune Sainte Marguerite": { query: "Cannes", display: "Île Sainte-Marguerite" },
  "Les Roches Summer Camp": { query: "Marbella", display: "Marbella" },
  "Saint Jean Bruel": "Saint-Jean-du-Bruel",
  "Saint Jean du Bruel": "Saint-Jean-du-Bruel",
  "Mariage Amaury & Julie": { query: "Tendu", display: "Tendu (Indre)" },
  "Mariage Amaury": { query: "Tendu", display: "Tendu (Indre)" },
  "Vacance Famille Villedieu": { query: "Vaison-la-Romaine", display: "Villedieu (Vaucluse)" },
};

function getLocationOverride(sejour) {
  if (!sejour.titre) return null;
  // Strip (TBC) et ? avant lookup
  const cleanedTitre = sejour.titre
    .replace(/\s*\(TBC\)\s*$/i, "")
    .replace(/\s*\?+\s*$/, "")
    .trim();
  const ov = LOCATION_OVERRIDES[cleanedTitre];
  if (!ov) return null;
  return typeof ov === "string" ? { query: ov, display: null } : ov;
}

// Extrait une query géocodable du séjour
function extractLocationQuery(sejour) {
  if (sejour.adresse) {
    const parts = sejour.adresse.split(",").map(p => p.trim()).filter(Boolean);
    if (parts.length >= 2) return parts[parts.length - 1];
    return sejour.adresse;
  }
  if (sejour.titre) {
    // Check overrides en premier
    const ov = getLocationOverride(sejour);
    if (ov) return ov.query;

    let q = sejour.titre;
    // Préfixes courants qui parasitent le géocodage (la VRAIE info est ce qui suit)
    q = q.replace(/^(Boulot|WeekEnd|Week-end|Ecole|École)\s+/i, "");
    q = q.replace(/^Vacances?\s+Famille\s+/i, "");
    q = q.replace(/^Chantier\s+(Jeune\s+)?/i, "");
    q = q.replace(/^Colo\s+/i, "");
    q = q.replace(/^Mariage\s+/i, "");
    // Suffixes
    q = q.replace(/\s+chez\s+\S+.*/i, "");
    q = q.replace(/\s*\(TBC\)/i, "");
    q = q.replace(/\s*\?+\s*$/, "");
    q = q.replace(/\s+Summer Camp\s*$/i, "");
    q = q.replace(/\s+World Dance Cup.*$/i, "");
    q = q.replace(/\s+(JAL|Carole|Anatole|Auguste|Sixtine)\s*$/i, "");
    return q.trim();
  }
  return null;
}

function isoDay(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

async function renderWeatherBlock(container, sejour) {
  // Stratégie simplifiée : météo today + 7j sur le lieu du séjour,
  // peu importe la date du séjour. Update auto via l'API à chaque ouverture.
  const fetchStart = new Date(TODAY);
  const fetchEnd = new Date(TODAY); fetchEnd.setDate(fetchEnd.getDate() + 4);  // 5 jours total

  const query = extractLocationQuery(sejour);
  if (!query) return;

  const block = el("div", { class: "weather-block" });
  const loading = el("div", { class: "weather-loading" }, "☁️ Météo en cours…");
  block.appendChild(loading);
  container.appendChild(block);

  const geo = await geocode(query);
  if (!geo) { block.remove(); return; }

  const daily = await fetchForecast(geo.lat, geo.lng, isoDay(fetchStart), isoDay(fetchEnd));
  if (!daily) { block.remove(); return; }

  block.innerHTML = "";
  const ov = getLocationOverride(sejour);
  const displayName = (ov && ov.display) ? ov.display : geo.name;
  block.appendChild(el("div", { class: "weather-label" }, `Météo à ${displayName} — 5 jours`));
  const strip = el("div", { class: "weather-strip" });
  for (let i = 0; i < daily.time.length; i++) {
    const d = parseDate(daily.time[i]);
    const tmax = Math.round(daily.temperature_2m_max[i]);
    const code = daily.weather_code[i];
    strip.appendChild(el("div", { class: "weather-cell" },
      el("div", { class: "weather-day" }, DOW_ABBR_FR[d.getDay()] + " " + d.getDate()),
      el("div", { class: "weather-icon" }, WMO_EMOJI[code] || "·"),
      el("div", { class: "weather-temp" }, tmax + "°"),
    ));
  }
  block.appendChild(strip);
}

function openSearch() {
  const overlay = el("div", { class: "search-overlay" });
  const close = () => overlay.remove();

  const hdr = el("div", { class: "search-header" });
  hdr.appendChild(el("button", { class: "search-close", type: "button", onClick: close, title: "Fermer" }, iconSpan("back")));
  const input = el("input", { class: "search-input", type: "text", placeholder: "Rechercher (lieu, vol, ref, contact…)" });
  hdr.appendChild(input);
  overlay.appendChild(hdr);

  const results = el("div", { class: "search-results" });
  overlay.appendChild(results);

  function update() {
    const q = input.value.trim().toLowerCase();
    results.innerHTML = "";
    if (q.length < 2) {
      results.appendChild(el("div", { class: "search-empty" }, "Tape au moins 2 caractères…"));
      return;
    }
    const matches = [];
    const seen = new Set();
    for (const u of DATA.users) {
      for (const item of computeItems(u.id)) {
        const o = item.obj;
        const hay = [
          o.titre, o.notes, o.compagnie, o.vol, o.reference,
          o.adresse, o.contact, o.gmapsUrl,
          ...(o.docs || []).map(d => d.label || ""),
        ].filter(Boolean).join(" ").toLowerCase();
        if (hay.includes(q)) {
          // dédup : pas 5x la même carte pour Famille au complet (Villedieu, Fleac…)
          const dedupKey = (item.kind === "sejour" ? o.titre + "|" + o.dateStart + "|" + o.dateEnd : o.titre + "|" + o.date) + "|" + u.id;
          if (!seen.has(dedupKey)) { seen.add(dedupKey); matches.push({ user: u, item }); }
        }
      }
    }
    if (matches.length === 0) {
      results.appendChild(el("div", { class: "search-empty" }, "Aucun résultat"));
      return;
    }
    for (const { user, item } of matches.slice(0, 100)) {
      const o = item.obj;
      const isSejour = item.kind === "sejour";
      const dateLabel = isSejour
        ? (o.dateStart === o.dateEnd ? fmtDateSingle(o.dateStart) : fmtDateRange(o.dateStart, o.dateEnd))
        : fmtDateSingle(o.date);
      const row = el("div", { class: "search-result" },
        avatarEl(user),
        el("div", { class: "search-result-info" },
          el("div", { class: "search-result-title" }, o.titre),
          el("div", { class: "search-result-meta" }, user.nom + " · " + dateLabel),
        ),
      );
      row.addEventListener("click", () => {
        close();
        navTo({ user: user.id, day: isSejour ? o.dateStart : o.date });
      });
      results.appendChild(row);
    }
  }

  input.addEventListener("input", update);
  input.addEventListener("keydown", (e) => { if (e.key === "Escape") close(); });
  document.body.appendChild(overlay);
  setTimeout(() => input.focus(), 80);
}

function getRoute() {
  const p = new URLSearchParams(location.search);
  return { edit: p.has("edit"), print: p.has("print"), user: p.get("user"), day: p.get("day") };
}
function navTo(params) {
  const url = new URL(location.href);
  [...url.searchParams.keys()].forEach(k => url.searchParams.delete(k));
  Object.entries(params).forEach(([k,v]) => { if (v != null) url.searchParams.set(k, v); });
  history.pushState({}, "", url.toString());
  render();
  window.scrollTo(0, 0);
}

function getIataFromInfo(info) {
  const oc = info.origine ? (info.origine.match(/\(([A-Z]{3})\)/) || [])[1] : "";
  const dc = info.destination ? (info.destination.match(/\(([A-Z]{3})\)/) || [])[1] : "";
  return { oc: oc || "", dc: dc || "" };
}

// Construit la route de trajet pour le print : compact, lisible par grands-parents.
// Pour multi-leg (ex. "Flight Dubai-Nice-Gonfaron"), montre origine (IATA si dispo)
// → destination FINALE (ville texte) car c'est là qu'ils viennent nous chercher.
function getPrintTrajetRoute(act, info) {
  const ttype = trajetType(act, info);
  const emoji = ttype === "vol" ? "✈" : ttype === "train" ? "🚆" : "🚗";
  const stripped = act.replace(/^(Flight|Vol|Fly|Train|TGV|TER|Trajet)\s+/i, "");
  const parts = stripped.split("-").map(s => s.trim()).filter(Boolean);
  const { oc, dc } = getIataFromInfo(info);
  if (parts.length === 2 && oc && dc) return `${emoji} ${oc}→${dc}`;
  if (parts.length >= 2) {
    const first = oc || parts[0];
    const last = parts[parts.length - 1];
    return `${emoji} ${first}→${last}`;
  }
  return `${emoji} ${stripped}`;
}

// Format heures : "08:00 → 14:30" si les deux dispo (idéal pour grands-parents
// venant chercher à l'aéroport), sinon dégradé propre.
function fmtTrajetTimes(info) {
  if (info.heureDepart && info.heureArrivee) return `${info.heureDepart} → ${info.heureArrivee}`;
  if (info.heureArrivee) return `arrivée ${info.heureArrivee}`;
  if (info.heureDepart) return `départ ${info.heureDepart}`;
  return "";
}

function buildPrintCell(iso, userId) {
  const colIdx = USER_COL_IDX[userId];
  const mmdd = iso.slice(5);
  const row = DATA.d.find(r => r[0] === mmdd);
  if (!row) return el("td", { class: "p-cell p-empty" }, el("div", { class: "p-cell-inner" }));
  const act = row[colIdx];
  if (!act) return el("td", { class: "p-cell p-empty" }, el("div", { class: "p-cell-inner" }));

  if (isTrajet(act)) {
    const note = (DATA.c || {})[`${iso}|${userId}`] || "";
    const info = parseTrajetNote(note);
    const route = getPrintTrajetRoute(act, info);
    const times = fmtTrajetTimes(info);
    return el("td", { class: "p-cell p-trajet" },
      el("div", { class: "p-cell-inner" },
        el("div", { class: "p-trajet-route" }, route),
        el("div", { class: "p-trajet-time" }, times || " ")
      )
    );
  }

  if (isRoutine(act)) {
    return el("td", { class: "p-cell p-routine" },
      el("div", { class: "p-cell-inner" },
        el("div", null, "🏠 Dubai")
      )
    );
  }

  // Séjour
  const tentatif = isTentatif(act) || hasTBC(act);
  const clean = stripTBC(cleanTitre(act));
  const label = lookupPrintLabel(clean);
  const group = getActivityGroup(clean);
  const isGonfaron = (clean === "Gonfaron");
  const cellClass = `p-cell p-sejour g-${group}`
    + (tentatif ? " is-tentatif" : "")
    + (isGonfaron ? " is-gonfaron" : "");
  return el("td", { class: cellClass },
    el("div", { class: "p-cell-inner" },
      el("div", { class: "p-sejour-title" }, label.title + (tentatif ? " ?" : "")),
      el("div", { class: "p-sejour-sub" }, label.sub || " ")
    )
  );
}

  for (const it of items) cards.appendChild(renderCard(it, userId, parseDate(it.dateEnd) < TODAY));
  app.appendChild(cards);

  addSearchFab();

  // Auto-expand + scroll si l'URL a un paramètre ?day=YYYY-MM-DD
  const routeDay = getRoute().day;
  if (routeDay) {
    setTimeout(() => {
      const targetCard = [...cards.querySelectorAll(".card")].find(c =>
        c.dataset.start && c.dataset.end &&
        routeDay >= c.dataset.start && routeDay <= c.dataset.end

        targetCard.scrollIntoView({ behavior: "smooth", block: "center" });
        targetCard.style.outline = "2px solid var(--accent)";
        setTimeout(() => { targetCard.style.outline = ""; }, 1500);

  if (lastIso < DATA.meta.dateEnd) {
    const startIso = shiftDate(lastIso, 1);
    app.appendChild(el("div", { class: "context-band" },
      iconSpan("home"),
      el("span", null,
        el("span", { class: "context-band-label" }, "À Dubai "),

function buildExpand(container, item, userId) {
  const o = item.obj;
  const isSejour = item.kind === "sejour";

  if (isSejour) {
    // Adresse + maps
    const adrBlock = el("div");
    if (o.adresse) {
      adrBlock.appendChild(el("div", { class: "field-label" }, "Adresse"));
      adrBlock.appendChild(el("div", { class: "field-value" }, o.adresse));
    }
    const mapsQ = o.gmapsUrl || `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(o.adresse || o.titre)}`;
    const mapsLabel = o.adresse ? "Ouvrir dans Maps" : "Chercher dans Maps";
    adrBlock.appendChild(el("a", { class: "btn-maps", href: mapsQ, target: "_blank", rel: "noopener" },
      iconSpan("mappin"), el("span", null, mapsLabel)));
    container.appendChild(adrBlock);

    if (o.notes) container.appendChild(blockFieldLinkified("Notes", o.notes));
    if (o.contact) {
      const c = el("div");
      c.appendChild(el("div", { class: "field-label" }, "Contact"));
      c.appendChild(el("div", { class: "contact-row" }, iconSpan("phone"), el("span", null, o.contact)));
      container.appendChild(c);
    }
    // Météo (fire-and-forget : se remplit quand prête)
    renderWeatherBlock(container, o);
  } else {
    // Trajet : 1 seule ligne compacte (compagnie · vol · réf · coût) + note nettoyée
    const infoParts = [];
    if (o.compagnie) infoParts.push(o.compagnie);
    if (o.vol) infoParts.push(o.vol);
    if (o.reference) infoParts.push("Réf. " + o.reference);
    if (o.cost) infoParts.push(o.cost);
    if (infoParts.length) {
      container.appendChild(el("div", { class: "trajet-info" }, infoParts.join(" · ")));
    }
    if (o.notes && o.notes.trim()) container.appendChild(blockFieldLinkified("Notes", o.notes));
  }

  if (o.docs && o.docs.length) {
    const d = el("div");
    d.appendChild(el("div", { class: "field-label" }, "Documents"));
    const wrap = el("div");
    for (const doc of o.docs) {
      const rawUrl = doc.url || `docs/${doc.file}`;
      const label = doc.label || doc.file;
      // Rewrite "docs/..." → GitHub raw (= cross-origin, force iOS PWA à ouvrir Safari natif)
      // URL absolue http(s) → utilisée telle quelle
      let url;
      if (/^https?:\/\//.test(rawUrl)) {
        url = rawUrl;
      } else if (rawUrl.startsWith("docs/") || rawUrl.startsWith("avatars/")) {
        // jsdelivr CDN : sert depuis GitHub avec les bons MIME types (PDFs inline)
        // encodeURI gère les espaces et caractères spéciaux
        url = `https://cdn.jsdelivr.net/gh/jal-hub/jal-summer-2026@main/${encodeURI(rawUrl)}`;
      } else {
        url = rawUrl;
      }
      const pill = el("a", {
        class: "doc-pill",
        href: url, target: "_blank", rel: "noopener noreferrer",
      }, iconSpan("doc"), el("span", null, label));
      const pdfShareBtn = el("button", { class: "doc-share", type: "button", title: "Partager ce PDF" }, iconSpan("share"));
      pdfShareBtn.addEventListener("click", (e) => {
        e.preventDefault(); e.stopPropagation();
        sharePdf(url, label);
      });
      const pillWrap = el("span", { class: "doc-pill-wrap" }, pill, pdfShareBtn);
      wrap.appendChild(pillWrap);
    }
    d.appendChild(wrap);
    container.appendChild(d);
  }
  // Note: le bouton "Partager" carte est dans le titleRow (en haut à droite) — voir renderCard
}

// === Share helpers ================================================================
function buildShareTextForItem(item, userId) {
  const o = item.obj;
  const isSejour = item.kind === "sejour";
  const lines = [];
  const emoji = isSejour ? "🏠" : ({vol:"✈️", train:"🚆", voiture:"🚗"}[o.type] || "↔️");
  lines.push(`${emoji} ${o.titre}`);
  if (isSejour) {
    lines.push(`${fmtDateRange(o.dateStart, o.dateEnd)} · ${nightsFromRange(o.dateStart, o.dateEnd)} nuits`);
    if (o.adresse) lines.push("📍 " + o.adresse);
    if (o.gmapsUrl) lines.push(o.gmapsUrl);
    if (o.contact) lines.push("📞 " + o.contact);
  } else {
    let meta = fmtDateSingle(o.date);
    if (o.heureDepart) meta += ` · ${o.heureDepart} → ${o.heureArrivee || ''}`;
    lines.push(meta);
    const infoParts = [];
    if (o.compagnie) infoParts.push(o.compagnie);
    if (o.vol) infoParts.push(o.vol);
    if (o.reference) infoParts.push("Réf. " + o.reference);
    if (o.cost) infoParts.push(o.cost);
    if (infoParts.length) lines.push(infoParts.join(" · "));
  }
  if (o.notes && o.notes.trim()) { lines.push(""); lines.push(o.notes.trim()); }
  if (o.docs && o.docs.length) {
    lines.push("");
    for (const d of o.docs) {
      let docUrl = d.url || `docs/${d.file}`;
      if (!/^https?:\/\//.test(docUrl) && (docUrl.startsWith("docs/") || docUrl.startsWith("avatars/"))) {
        docUrl = `https://cdn.jsdelivr.net/gh/jal-hub/jal-summer-2026@main/${encodeURI(docUrl)}`;
      }
      lines.push("📄 " + (d.label || d.file) + " : " + docUrl);
    }
  }
  lines.push("");
  const appUrl = new URL(location.href);
  [...appUrl.searchParams.keys()].forEach(k => appUrl.searchParams.delete(k));
  appUrl.searchParams.set("user", userId);
  appUrl.searchParams.set("day", isSejour ? o.dateStart : o.date);
  lines.push("📱 " + appUrl.toString());
  return lines.join("\n");
}

async function shareItem(item, userId) {
  const text = buildShareTextForItem(item, userId);
  if (navigator.share) {
    try { await navigator.share({ text, title: item.obj.titre }); return; }
    catch (e) { if (e.name === "AbortError") return; }
  }
  try { await navigator.clipboard.writeText(text); showToast("Copié dans le presse-papier"); }
  catch (e) { showToast("Partage indisponible", true); }
}

async function sharePdf(url, label) {
  // Tente d'abord de partager le PDF comme FICHIER (envoie le doc dans WhatsApp,
  // pas juste l'URL). Nécessite navigator.canShare({files:...}) — iOS 16+.
  if (navigator.share && navigator.canShare) {
    try {
      showToast("Téléchargement du PDF…");
      const res = await fetch(url, { credentials: "omit" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const blob = await res.blob();
      const fileName = (label || "document").replace(/[^a-zA-Z0-9._-]+/g, "_") + ".pdf";
      const file = new File([blob], fileName, { type: "application/pdf" });
      if (navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: label });
        return;
      }
    } catch (e) {
      if (e.name === "AbortError") return;
      console.warn("Share file failed, fallback to URL:", e);
    }
  }
  // Fallback : partage l'URL
  if (navigator.share) {
    try { await navigator.share({ url, title: label }); return; }
    catch (e) { if (e.name === "AbortError") return; }
  }
  // Desktop : copie le lien
  try { await navigator.clipboard.writeText(url); showToast("Lien copié"); }
  catch (e) { showToast("Partage indisponible", true); }
}

function blockField(label, value) {
  const b = el("div");
  b.appendChild(el("div", { class: "field-label" }, label));
  b.appendChild(el("div", { class: "field-value" }, value));
  return b;
}
// Variante linkifiée : transforme http(s)://… et www.… en liens cliquables
function linkifyHtml(text) {
  if (!text) return "";
  const esc = String(text).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"})[c]);
  return esc.replace(
    /(https?:\/\/[^\s<>"]+|\bwww\.[^\s<>"]+)/g,
    (m) => {
      const href = m.startsWith("http") ? m : "https://" + m;
      return '<a href="' + href + '" target="_blank" rel="noopener noreferrer" style="color:var(--accent);text-decoration:underline;">' + m + '</a>';
    }
  );
}
function blockFieldLinkified(label, value) {
  const b = el("div");
  b.appendChild(el("div", { class: "field-label" }, label));
  b.appendChild(el("div", { class: "field-value", html: linkifyHtml(value) }));
  return b;
}

// === Calendrier famille ============================================================
const DOW_FR = ["L", "M", "M", "J", "V", "S", "D"];

function renderCalendar() {
  const wrap = document.createDocumentFragment();
  wrap.appendChild(el("div", { class: "cal-eyebrow" }, "Calendrier famille — tap sur un jour"));
  const cal = el("div", { class: "cal-wrap" });
  const start = parseDate(DATA.meta.dateStart);
  const end = parseDate(DATA.meta.dateEnd);
  const startYM = start.getFullYear() * 12 + start.getMonth();
  const endYM = end.getFullYear() * 12 + end.getMonth();
  for (let ym = startYM; ym <= endYM; ym++) {
    cal.appendChild(renderMonth(Math.floor(ym / 12), ym % 12, start, end));
  }
  wrap.appendChild(cal);
  return wrap;
}

function renderMonth(year, month, dataStart, dataEnd) {
  const monthEl = el("div", { class: "cal-month" });
  monthEl.appendChild(el("div", { class: "cal-month-title" }, `${MONTHS_LONG[month]} ${year}`));

  const dowRow = el("div", { class: "cal-dow" });
  for (const d of DOW_FR) dowRow.appendChild(el("div", null, d));
  monthEl.appendChild(dowRow);

  const days = el("div", { class: "cal-days" });
  const firstOfMonth = new Date(year, month, 1);
  const firstDow = (firstOfMonth.getDay() + 6) % 7; // Lundi = 0
  for (let i = 0; i < firstDow; i++) days.appendChild(el("div", null));

  const daysInMonth = new Date(year, month + 1, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const dateObj = new Date(year, month, d);
    const inRange = dateObj >= dataStart && dateObj <= dataEnd;
    const isToday = dateObj.getTime() === TODAY.getTime();
    const iso = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cls = "cal-day" + (inRange ? "" : " is-out") + (isToday ? " is-today" : "");
    const cell = el("button", {
      class: cls, type: "button",
    }, String(d));
    if (inRange) cell.addEventListener("click", () => openDaySheet(iso));
    days.appendChild(cell);
  }
  monthEl.appendChild(days);
  return monthEl;
}

// Ouvre un PDF dans un overlay plein écran in-app, avec close + share natif iOS.
// - Bouton "Fermer" → revenir au programme (close overlay)
// - Bouton "Partager" → utilise navigator.share (iOS share sheet : ouvrir Safari, Files, Mail…)
// - Rendu : <embed> (meilleur que iframe sur iOS pour les PDFs)
function openPdfOverlay(url, label) {
  const overlay = el("div", { class: "doc-overlay" });
  const bar = el("div", { class: "doc-overlay-bar" });
  const close = () => {
    overlay.style.opacity = "0";
    setTimeout(() => overlay.remove(), 220);
  };
  bar.appendChild(el("button", { class: "doc-overlay-close", type: "button", onClick: close }, "← Fermer"));
  bar.appendChild(el("div", { class: "doc-overlay-label" }, label || "Document"));

  // Action "Partager" : utilise navigator.share pour ouvrir l'iOS share sheet
  // (Safari, Files, Mail, etc.). Fallback : target=_blank.
  const shareBtn = el("button", { class: "doc-overlay-extern", type: "button" }, "Partager");
  shareBtn.addEventListener("click", async () => {
    const absUrl = url.startsWith("http") ? url : new URL(url, location.href).href;
    if (navigator.share) {
      try { await navigator.share({ url: absUrl, title: label || "PDF" }); return; }
      catch (e) { if (e.name === "AbortError") return; }
    }
    // Fallback : nouvel onglet
    window.open(absUrl, "_blank", "noopener,noreferrer");
  });
  bar.appendChild(shareBtn);
  overlay.appendChild(bar);

  // PDF rendu via <embed> (plus stable que iframe sur iOS pour PDFs)
  const viewer = el("embed", {
    src: url, type: "application/pdf", title: label || "PDF"
  });
  overlay.appendChild(viewer);

  document.body.appendChild(overlay);
  requestAnimationFrame(() => overlay.classList.add("show"));
}

function openDaySheet(iso) {
  const md = iso.slice(5);
  const row = DATA.d.find(r => r[0] === md);
  if (!row) return;

  const backdrop = el("div", { class: "sheet-backdrop" });
  const sheet = el("div", { class: "sheet" });
  sheet.appendChild(el("div", { class: "sheet-grip" }));
  sheet.appendChild(el("div", { class: "sheet-title" }, fmtDateSingle(iso)));

  for (const u of DATA.users) {
    const act = row[USER_COL_IDX[u.id]] || "";
    const rowEl = el("div", { class: "sheet-row" },
      avatarEl(u),
      el("div", { class: "sheet-row-name" }, u.nom),
      el("div", { class: "sheet-row-act" }, act || "—"),
      el("div", { class: "sheet-row-chev" }, "›"),

    rowEl.addEventListener("click", () => {

      // Petit délai pour fluidité de l'animation de fermeture

  document.body.appendChild(backdrop);
  document.body.appendChild(sheet);
  requestAnimationFrame(() => {
    backdrop.classList.add("show");
    sheet.classList.add("show");
  });
}

// === SAVE INFRASTRUCTURE (FSA + IDB) — port de l'OLD index.html ====================
const IDB_NAME = "jalSummerDB", IDB_STORE = "handles", IDB_KEY_HTML = "dashboardHtml";
let HTML_HANDLE = null;
let DIRTY = false;

function idbOpen() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(IDB_NAME, 1);
    r.onupgradeneeded = () => r.result.createObjectStore(IDB_STORE);
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function idbGet(key) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction(IDB_STORE, "readonly");
    const req = tx.objectStore(IDB_STORE).get(key);
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}
async function idbPut(key, v) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction(IDB_STORE, "readwrite");
    tx.objectStore(IDB_STORE).put(v, key);
    tx.oncomplete = () => res();
    tx.onerror = () => rej(tx.error);
  });
}
async function idbDel(key) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction(IDB_STORE, "readwrite");
    tx.objectStore(IDB_STORE).delete(key);
    tx.oncomplete = () => res();
    tx.onerror = () => rej(tx.error);
  });
}
async function ensurePermission(handle) {
  if (!handle) return false;
  try {
    if ((await handle.queryPermission({ mode: "readwrite" })) === "granted") return true;
    return (await handle.requestPermission({ mode: "readwrite" })) === "granted";
  } catch (e) { return false; }
}
async function writeBlobToHandle(handle, blob) {
  const writable = await handle.createWritable();
  await writable.write(blob);
  await writable.close();
}

async function saveDashboardHtml() {
  try {
    let handle = HTML_HANDLE;
    if (!handle && "showSaveFilePicker" in window) {
      try {
        handle = await window.showSaveFilePicker({
          suggestedName: "index.html",
          types: [{ description: "HTML", accept: { "text/html": [".html", ".htm"] } }],
        });
        HTML_HANDLE = handle;
        idbPut(IDB_KEY_HTML, handle).catch(e => console.warn("[save] idbPut failed", e));
      } catch (e) {
        if (e.name === "AbortError") { showToast("Sauvegarde annulée"); return false; }
        throw e;
      }
    }
    const dataJson = JSON.stringify(DATA);
    let currentHtml;
    if (handle) {
      if (!(await ensurePermission(handle))) throw new Error("Permission refusée");
      const file = await handle.getFile();
      currentHtml = await file.text();
    } else {
      currentHtml = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
    }
    if (!currentHtml || currentHtml.length < 1000) {
      throw new Error(`Doc trop petit (${currentHtml.length} octets)`);
    }
    let newHtml = currentHtml.replace(
      /let DATA\s*=\s*\{[\s\S]*?\};(?=\s*\n\s*const TODAY)/m,
      `let DATA = ${dataJson};`
    );
    if (newHtml === currentHtml) {
      newHtml = currentHtml.replace(/let DATA\s*=\s*\{[\s\S]*?\};/m, `let DATA = ${dataJson};`);
      if (newHtml === currentHtml) throw new Error("Pattern 'let DATA = {...};' introuvable");
    }
    if (newHtml.length < 1000) throw new Error(`HTML résultant trop petit (${newHtml.length})`);
    const blob = new Blob([newHtml], { type: "text/html" });
    if (handle) {
      await writeBlobToHandle(handle, blob);
      markSaved();
      showToast(`Sauvé · ${(newHtml.length/1024).toFixed(1)} KB`);
      return true;
    }
    // Fallback download
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "index.html";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    markSaved();
    showToast(`Téléchargé · à déplacer vers index.html`);
    return true;
  } catch (e) {
    console.error(e);
    showToast(`Échec : ${e.message}`, true);
    return false;
  }
}

function showToast(msg, isError) {
  let t = document.querySelector(".toast");
  if (!t) { t = el("div", { class: "toast" }); document.body.appendChild(t); }
  t.textContent = msg;
  t.className = "toast show" + (isError ? " error" : "");
  clearTimeout(t._tid);
  t._tid = setTimeout(() => { t.className = "toast" + (isError ? " error" : ""); }, 3500);
}

function markDirty() {
  DIRTY = true;
  const btn = document.querySelector(".save-btn");
  if (btn) btn.classList.add("is-dirty");
}
function markSaved() {
  DIRTY = false;
  const btn = document.querySelector(".save-btn");
  if (btn) btn.classList.remove("is-dirty");
}

// Warn on unsaved navigation
window.addEventListener("beforeunload", (e) => {
  if (DIRTY) { e.preventDefault(); e.returnValue = ""; }
});

// IIFE : restore HTML handle from IDB
(async () => {
  try { const h = await idbGet(IDB_KEY_HTML); if (h) HTML_HANDLE = h; }
  catch (e) {}
})();

function renderEdit() {

  document.querySelectorAll(".search-fab").forEach(e => e.remove());
